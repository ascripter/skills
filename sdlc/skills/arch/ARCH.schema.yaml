# =============================================================================
# ARCH.schema.yaml — canonical human-readable schema for docs/ARCH.yaml
# =============================================================================
# This is the system-level architecture artifact. Per-container deep-dive
# lives in sibling docs/ARCH__<container>.yaml files (see
# ARCH__CONTAINER.schema.yaml).
#
# Field-by-field semantics, required vs optional, enum values, and the four
# cross-checks are all enforced by validate_schema.py (Pydantic v2). This
# file is the source of truth for *humans and AI agents reading the spec*;
# validate_schema.py is the source of truth for *machines validating the
# output*. Keep them in lockstep.
#
# Conventions:
#   * Required fields are marked `# REQUIRED`.
#   * Optional fields are marked `# OPTIONAL`.
#   * Enum values are listed inline.
#   * `<field>_confidence: confirmed | inferred | assumption` siblings are
#     written next to every non-trivial scalar to help downstream agents
#     weigh how seriously to trust the value.
# =============================================================================

metadata:                                  # REQUIRED
  arch_version: "1.0"                      # REQUIRED — schema version string
  last_updated: <ISO-8601 UTC>             # REQUIRED — bumped on every write
  generated_by: sdlc-arch                  # REQUIRED — always this literal
  session_id: <uuid4>                      # REQUIRED — links to state file
  status: draft | complete                 # REQUIRED — see §metadata.status in CLAUDE.md

# ---------------------------------------------------------------------------
# architecture_pattern — the system's top-level architectural style.
# Drives the agent's expectations for everything downstream (test, task,
# deploy). Confirm with the user before any container interview.
# ---------------------------------------------------------------------------
architecture_pattern:                      # REQUIRED
  pattern:                                 # REQUIRED — one of:
    # monolith | modular_monolith | microservices | event_driven |
    # hexagonal | serverless | plugin | pipeline | other
  pattern_confidence: confirmed | inferred | assumption  # REQUIRED
  rationale: <one to three sentences>      # REQUIRED — why this pattern fits
  tradeoff_notes: <short string>           # OPTIONAL — what we accept in exchange
  ai_builder_notes: <short string>         # OPTIONAL — pattern-specific hints for
                                           #            AI-built code (e.g. "few
                                           #            moving parts; prefer
                                           #            typed interfaces between
                                           #            components")

# ---------------------------------------------------------------------------
# identity_and_auth — system-wide identity strategy. Per-container auth
# specifics live in the container's own ARCH__<container>.yaml.
# ---------------------------------------------------------------------------
identity_and_auth:                         # REQUIRED
  identity_provider:                       # REQUIRED — one of:
    # internal | external_oidc | external_saml | external_proprietary | none
  identity_provider_confidence: confirmed | inferred | assumption  # REQUIRED
  token_strategy:                          # REQUIRED — one of:
    # jwt | session | api_key | mtls | opaque_token | none
  token_strategy_confidence: confirmed | inferred | assumption    # REQUIRED
  identity_container:                      # OPTIONAL — if identity_provider == internal,
                                           #            which container_id hosts it
  rationale: <one or two sentences>        # OPTIONAL

# ---------------------------------------------------------------------------
# containers — the canonical list of independently runnable/deployable units.
# Each entry corresponds to (at most) one ARCH__<container>.yaml file.
#
# `container_id` is kebab-case; it doubles as the slug in
# docs/ARCH__<container>.yaml. It MUST be unique within this file.
#
# `owns_*` fields trace this container back to upstream artifacts and feed
# the four coverage checks in Phase 7.
# ---------------------------------------------------------------------------
containers:                                # REQUIRED — non-empty
  - container_id: <kebab-case>             # REQUIRED — e.g. "backend-api"
    archetype:                             # REQUIRED — one of (see container-taxonomy.yaml):
      # backend-api | web-frontend | mobile-frontend | desktop-frontend |
      # cli | worker | scheduler | stream-processor | gateway |
      # bff | edge-function | static-site | identity-provider |
      # primary-database | secondary-database | cache | blob-store |
      # search-index | message-bus | etl-pipeline | ml-inference |
      # external-service | other
    purpose: <one or two sentences>        # REQUIRED
    owns_api_resources:                    # REQUIRED — list of API resource_ids
      - users                              #            (from API__<resource>.yaml). Empty
      - projects                           #            list is allowed (e.g. for stores).
    owns_ux_surfaces:                      # REQUIRED — list of UX surface_ids
      - dashboard                          #            (from UX__<surface>.yaml). Empty
                                           #            for backend-only containers.
    persistence:                           # REQUIRED — list of DATA store ids; empty
      - primary-postgres                   #            for non-stateful containers.
    deployment_unit:                       # REQUIRED — one of:
      # long_running_service | scheduled_job | batch_job | static_asset |
      # serverless_function | container | external_managed
    ownership:                             # OPTIONAL
      team: <string>                       # OPTIONAL
      change_cadence: <string>             # OPTIONAL — e.g. "weekly", "monthly"
    external: false                        # OPTIONAL — true means this container is a
                                           #            third-party service we depend on,
                                           #            not something we build. When true,
                                           #            this container MUST NOT have an
                                           #            ARCH__<id>.yaml sibling (container
                                           #            mode aborts on external containers).
    status: defined | draft | confirmed    # REQUIRED — interview progress per container
    file_path:                             # OPTIONAL — set by container mode on completion;
                                           #            e.g. "docs/ARCH__backend-api.yaml".
                                           #            Validator cross-checks that the
                                           #            referenced file exists on disk
                                           #            AND that every sibling
                                           #            ARCH__*.yaml is referenced by some
                                           #            container's file_path.
    acceptance_criteria:                   # OPTIONAL — list of short strings telling the
      - <string>                           #            downstream `task` and `test` agents
                                           #            what "done" looks like for this
                                           #            container (e.g. "passes the
                                           #            integration test suite for all
                                           #            owned API resources"). Container
                                           #            mode's `per_container_deepdive`
                                           #            can populate this.
    notes: <string>                        # OPTIONAL

# ---------------------------------------------------------------------------
# edges — typed, directional dependency graph BETWEEN containers.
# Internal-to-container edges live in ARCH__<container>.yaml.
#
# Auto-derived from API + DATA + UX in Phase 6 and via -d mode; users
# confirm or edit, they do not enumerate from scratch.
#
# An EMPTY list `[]` is valid (single-container CLIs with no persistence
# and no external integrations legitimately have no edges). The validator
# only requires the `edges:` key to be PRESENT (not null); an empty list
# does not block `status: complete`.
#
# The `via_*` fields are OPTIONAL but strongly recommended — they let the
# downstream `test` and `task` agents ground each edge in a specific
# upstream artifact rather than re-deriving from scratch. Pre-fill them
# during edge derivation whenever the evidence is unambiguous.
# ---------------------------------------------------------------------------
edges:                                     # REQUIRED key (may be `[]`)
  - from: <container_id>                   # REQUIRED — must exist in containers[]
    to: <container_id>                     # REQUIRED — must exist in containers[]
    type:                                  # REQUIRED — one of:
      # depends_on | calls | reads | writes | publishes | subscribes_to | implements
    via_resource_id: <api_resource_id>     # OPTIONAL — for `calls` edges, the
                                           #            API resource being called.
                                           #            Validated against API__*.yaml
                                           #            resource_ids when set.
    via_channel_id: <event_channel_id>     # OPTIONAL — for `publishes` / `subscribes_to`
                                           #            edges, the API.events channel_id.
                                           #            Validated against API.yaml
                                           #            events.channels[].channel_id when set.
    via_entity: <PascalCaseEntityName>     # OPTIONAL — for `reads` / `writes` edges, the
                                           #            primary DATA entity being accessed.
                                           #            Validated against DATA-MODEL.yaml
                                           #            entities when set.
    note: <short string>                   # OPTIONAL — evidence or rationale
                                           #            (e.g. "API users → backend-api;
                                           #            backend-api writes primary-postgres")

# ---------------------------------------------------------------------------
# arch_warnings — non-fatal issues surfaced during interview or validation.
# Populated by the validator's cross-checks (uncovered resources/surfaces/
# stores) and by the user marking themes as `todo`.
# ---------------------------------------------------------------------------
arch_warnings:                             # OPTIONAL — list of short strings
  - "Uncovered API resource: payments"
  - "TODO: address theme cross_container_edges"

# =============================================================================
# Required cross-checks (validate_schema.py)
# =============================================================================
# 1. API-resource coverage — every resource in API__*.yaml appears in some
#    container's owns_api_resources.
# 2. UX-surface coverage — every data-bearing surface in UX__*.yaml appears
#    in some container's owns_ux_surfaces.
#    "Data-bearing" surfaces (downstream agents must own the data flow): one
#    of {screen, page, tab, modal, dialog, drawer, panel, cli_command,
#    flow_step, other}. Excluded as non-data-bearing: {empty_state, toast,
#    overlay}.
# 3. DATA-store coverage — every store in DATA-MODEL.persistence appears
#    in some container's persistence.
# 4. Edge endpoint integrity — every edges[].from and edges[].to is a valid
#    container_id.
# 5. Edge via_resource_id (when set) resolves to an API__*.yaml resource_id.
# 6. Edge via_channel_id (when set) resolves to API.yaml events.channels[].channel_id.
# 7. Edge via_entity (when set) resolves to a DATA-MODEL.yaml entity name.
# 8. file_path integrity — every containers[].file_path that is set points
#    to a file that exists on disk; every sibling docs/ARCH__*.yaml is
#    referenced by some container's file_path.
# 9. Upstream metadata.status warning — if any of PRD/UX/DATA/API has
#    metadata.status != "complete", emit a warning (not a fail); a downstream
#    agent reading ARCH should know it was built on a partial chain.
#
# Container-vs-system consistency (see ARCH__CONTAINER.schema.yaml for
# checks 10–13 — owns/api/ux/persistence containment plus component traces).
# =============================================================================
