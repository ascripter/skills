# =============================================================================
# ARCH__CONTAINER.schema.yaml — canonical schema for one
#   docs/ARCH__<container>.yaml
# =============================================================================
# Produced by /sdlc:arch <container>. Mirrors a single container's row in
# ARCH.yaml but adds tech, deployment, observability, ownership, failure
# modes, security, components, and internal/external edges.
#
# This file is the source of truth for AI agents that need to implement,
# test, or deploy the container. Downstream skills (test, task, deploy)
# read it directly.
#
# External-container exemption: this file is NEVER authored for containers
# with `external: true` in ARCH.yaml.containers[]. Container mode aborts on
# external archetypes (identity-provider used externally, all data-store
# archetypes, `external-service`). If a hand-written ARCH__<external>.yaml
# exists, the validator skips the "REQUIRED for non-external" checks but
# warns that the file should not exist.
# =============================================================================

metadata:                                  # REQUIRED
  arch_container_version: "1.2"            # REQUIRED
  last_updated: <ISO-8601 UTC>             # REQUIRED — bumped on every write
  generated_by: sdlc-arch                  # REQUIRED
  session_id: <uuid4>                      # REQUIRED — sub-session id from state file
  status: draft | complete                 # REQUIRED
  changelog:                               # OPTIONAL — append-only, most-recent first.
    # Each entry: "<arch_container_version> (<YYYY-MM-DD>): <one-line summary>".
    # Validator type-checks Optional[List[str]] only.
    - "1.0 (2026-05-26): Initial container deep-dive."
  upstream_provenance:                     # OPTIONAL — one entry per upstream artifact
    # consumed when this container was drilled, each a mapping
    # {file, session_id, last_updated, sha256}. Lets a later /sdlc:arch <container>
    # detect upstream drift since the last drill. Validator type-checks
    # list-of-mappings only. See CLAUDE.md §7 "Upstream-change re-invocation".
    - {file: docs/DATA-MODEL.yaml, session_id: <uuid4>, last_updated: <iso8601>, sha256: <16-hex>}

# ---------------------------------------------------------------------------
# Identity — must match the parent ARCH.yaml entry verbatim.
# ---------------------------------------------------------------------------
container_id: <kebab-case>                 # REQUIRED — matches an entry in ARCH.yaml.containers[]
archetype: <enum>                          # REQUIRED — same enum as ARCH.yaml.containers[].archetype
overview: <two or three sentences>         # REQUIRED — purpose & responsibilities

# ---------------------------------------------------------------------------
# tech_stack — chosen technologies. Most fields pre-filled from PRD's
# technical_constraints; user confirms or refines.
# ---------------------------------------------------------------------------
tech_stack:                                # REQUIRED for non-external containers
  language: <string>                       # REQUIRED — e.g. "TypeScript", "Python", "Go"
  language_confidence: confirmed | inferred | assumption  # REQUIRED
  framework: <string>                      # OPTIONAL — e.g. "FastAPI", "Next.js"
  runtime_version: <string>                # OPTIONAL — e.g. "node 20", "python 3.12"
  package_manager: <string>                # OPTIONAL — e.g. "pnpm", "uv", "go mod"
  build_tool: <string>                     # OPTIONAL — e.g. "vite", "esbuild"
  key_libraries:                           # OPTIONAL — short list, no transitive deps
    - <string>

# ---------------------------------------------------------------------------
# persistence_bindings — every DATA store this container reads or writes.
# Pre-filled from ARCH.yaml.containers[id].persistence; the user may add
# bindings here for additional usage (e.g. a feature-flag cache).
# ---------------------------------------------------------------------------
persistence_bindings:                      # OPTIONAL — list (empty for stateless)
  - store_id: primary-postgres             # REQUIRED — must exist in DATA-MODEL.persistence
    access: read | write | read_write      # REQUIRED
    via: <library/driver/orm>              # OPTIONAL — e.g. "SQLAlchemy", "Prisma"
    note: <short string>                   # OPTIONAL

# ---------------------------------------------------------------------------
# api_surface — which API resources this container exposes.
# Frontend containers have empty api_surface; their consumption shows up
# under api_consumers below.
# ---------------------------------------------------------------------------
api_surface:                               # OPTIONAL — list (empty for non-backends)
  - resource_id: users                     # REQUIRED — must exist in API__<resource>.yaml
    note: <short string>                   # OPTIONAL

api_consumers:                             # OPTIONAL — list of resources this container CALLS
  - resource_id: users                     # REQUIRED — must exist in API__<resource>.yaml
    in_same_container: false               # OPTIONAL — true if calling self via internal contract

# ---------------------------------------------------------------------------
# ux_surface — which UX surfaces this container renders. Backend containers
# have empty ux_surface.
# ---------------------------------------------------------------------------
ux_surface:                                # OPTIONAL — list (empty for non-frontends)
  - surface_id: dashboard                  # REQUIRED — must exist in UX__<surface>.yaml
    note: <short string>                   # OPTIONAL

# ---------------------------------------------------------------------------
# deployment — how this container is shipped and run.
#
# `deployment.shape` is a SPECIALIZATION of the parent container's
# `deployment_unit` (in ARCH.yaml). The validator enforces the following
# compatibility map:
#
#   ARCH.yaml deployment_unit  | acceptable deployment.shape values
#   ---------------------------|--------------------------------------------
#   long_running_service       | long_running_service | container
#   scheduled_job              | scheduled_job
#   batch_job                  | batch_job
#   static_asset               | static_asset
#   serverless_function        | serverless_function
#   container                  | container | long_running_service
#   external_managed           | managed_service
#
# Additionally, archetype-specific shapes are allowed regardless of parent:
#   - desktop-frontend archetype → desktop_app
#   - mobile-frontend archetype  → mobile_app
#   - cli archetype              → cli_binary
# ---------------------------------------------------------------------------
deployment:                                # REQUIRED for non-external
  shape:                                   # REQUIRED — one of:
    # container | serverless_function | static_asset | managed_service |
    # long_running_service | scheduled_job | batch_job | desktop_app |
    # mobile_app | cli_binary
  shape_confidence: confirmed | inferred | assumption  # REQUIRED
  hosting: <string>                        # OPTIONAL — e.g. "AWS Fargate", "Cloud Run"
  scaling:                                 # OPTIONAL
    min_replicas: <int>                    # OPTIONAL
    max_replicas: <int>                    # OPTIONAL
    autoscale_signal: <string>             # OPTIONAL — e.g. "cpu>70", "queue_depth>100"
  regions: [<string>, ...]                 # OPTIONAL
  scheduling: <string>                     # OPTIONAL — for scheduled_job shapes (cron expr)
  notes: <string>                          # OPTIONAL

# ---------------------------------------------------------------------------
# observability — logs / metrics / traces / alerts. Light per container —
# detailed observability infra is captured in /sdlc:deploy.
# ---------------------------------------------------------------------------
observability:                             # REQUIRED
  logs: <string>                           # OPTIONAL — e.g. "stdout json", "syslog"
  metrics: <string>                        # OPTIONAL — e.g. "prometheus", "statsd"
  traces: <string>                         # OPTIONAL — e.g. "otel http to collector"
  alerts:                                  # OPTIONAL
    - condition: <string>
      action: <string>

# ---------------------------------------------------------------------------
# ownership — team and change cadence. Pre-filled from ARCH.yaml when set.
# ---------------------------------------------------------------------------
ownership:                                 # OPTIONAL
  team: <string>
  change_cadence: <string>
  on_call_rotation: <string>

# ---------------------------------------------------------------------------
# failure_modes — what breaks, how it manifests, mitigation. `high` per item.
# ---------------------------------------------------------------------------
failure_modes:                             # REQUIRED — non-empty unless trivially-stateless
  - id: <kebab-case>
    description: <one sentence>
    likelihood: low | medium | high
    impact: low | medium | high
    mitigation: <one or two sentences>

# ---------------------------------------------------------------------------
# security_concerns — structured list of risks specific to this container.
# Pre-filled from DATA classification + PRD security_compliance.
#
# Each entry has a stable id so downstream `task` and `test` agents can
# reference it without ambiguity. The `mitigation` field is optional but
# strongly encouraged — it's what the `test` agent uses to scaffold the
# corresponding negative / abuse-case test.
#
# Backwards-compatible: a string-only entry (the v1.0 shape) is still
# accepted by the validator and treated as `{ id: auto, threat: <string> }`.
# ---------------------------------------------------------------------------
security_concerns:                         # OPTIONAL — list[SecurityConcern]
  - id: <kebab-case>                       # REQUIRED when entry is structured
    threat: <short string>                 # REQUIRED — the risk/threat
    mitigation: <short string>             # OPTIONAL — how we mitigate it
    related_data_classification:           # OPTIONAL — list of "Entity.field"
      - "User.email"                       #            references from
                                           #            DATA-MODEL.data_classification

# ---------------------------------------------------------------------------
# components — internal decomposition. `critical` per item drill-down.
# Component edges are kept here on each component (`edges:` list),
# mirroring how ARCH.yaml stores container edges.
#
# `archetype` is an enum drawn from references/component-taxonomy.yaml.
# `traces_*` fields ground each component in upstream artifacts; the
# validator cross-checks them (cross-checks 11/12/13 below).
#
# `code_location` is the component → code-module seam: which directory(ies)
# / module(s) this component's source lives in. It is the single most
# load-bearing field for autonomous downstream task breakdown and codegen —
# without it the `task` agent must INVENT each component's file placement,
# and an invented path is the most common way a generated repo drifts from
# its architecture. The downstream `task` skill grounds each task's
# `target_files` in the owning component's `code_location` (validated). See
# references/component-discovery.md → "Deriving code_location".
# ---------------------------------------------------------------------------
components:                                # REQUIRED — non-empty
  - component_id: <kebab-case>             # REQUIRED — unique within this container
    archetype:                             # REQUIRED — one of (see component-taxonomy.yaml):
      # controller | service | repository | middleware | use_case | view |
      # state_store | api_client | event_handler | scheduler | validator |
      # serializer | cache_client | blob_client | background_worker |
      # config_loader | observability_bootstrap | error_handler | other
    purpose: <one sentence>                # REQUIRED
    responsibilities:                      # REQUIRED — non-empty
      - <one short sentence>
    code_location:                         # OPTIONAL but strongly encouraged — the
      - "src/auth/"                        #   repo-relative directory(ies) and/or
      - "src/auth/service.py"              #   illustrative file(s) where this
                                           #   component's source lives. DIRECTORY
                                           #   entries are the firm contract;
                                           #   file-level entries are illustrative
                                           #   for the executor to confirm. Keyed to
                                           #   the project's source layout / import
                                           #   layering (e.g. a layered backend's
                                           #   controllers/ services/ repositories/,
                                           #   or a CLI's config/ core/ ui/). A
                                           #   component may span layers (list each).
                                           #   The validator emits a non-blocking
                                           #   WARNING for a non-trivial component
                                           #   with traces but no code_location.
    inputs:                                # OPTIONAL
      - <string>
    outputs:                               # OPTIONAL
      - <string>
    traces_api_resources:                  # OPTIONAL — list of API resource_ids
      - users                              #            this component implements.
                                           #            Validated against API__*.yaml
                                           #            resource_ids.
    traces_api_operations:                 # OPTIONAL — list of OpenAPI operation_id
      - get-user                           #            strings (from API__*.yaml
      - create-user                        #            endpoints[].operation_id).
                                           #            Lets the `test` agent scaffold
                                           #            endpoint-level test cases.
                                           #            Validated against API__*.yaml.
    traces_ux_surfaces:                    # OPTIONAL — list of UX surface_ids
      - dashboard                          #            this component renders.
                                           #            Validated against UX__*.yaml.
    traces_data_entities:                  # OPTIONAL — list of DATA entity names
      - User                               #            (PascalCase) this component
                                           #            reads/writes. Validated against
                                           #            DATA-MODEL.yaml.entities ONLY —
                                           #            entities, not enums/value types
                                           #            (enums_and_lookups.enums). To
                                           #            reference an enum, trace the
                                           #            entity that carries it instead.
    implements_requirements:               # OPTIONAL — PRD requirements this component
      - FR-001                             #            implements. Accepts FR-NNN
      - NFR-011                            #            (features) and NFR-NNN
                                           #            (non-functional). Validated for
                                           #            FR-NNN/NFR-NNN format, existence
                                           #            in PRD.yaml, AND containment: must
                                           #            be a subset of the parent
                                           #            container's implements_requirements.
    traces_prd_workflows:                  # OPTIONAL — PRD core_workflows (WKF-NNN) this
      - WKF-003                            #            component participates in.
                                           #            Validated for WKF-NNN format +
                                           #            existence in PRD.yaml.
    failure_modes:                         # OPTIONAL — structured per item, same shape
                                           #            as container-level failure_modes.
                                           #            Backwards-compatible: a bare
                                           #            string entry is accepted as
                                           #            { id: auto, description: <str> }.
      - id: <kebab-case>
        description: <one sentence>
        likelihood: low | medium | high
        impact: low | medium | high
        mitigation: <one or two sentences>
    acceptance_criteria:                   # OPTIONAL — list of short strings telling
      - <string>                           #            the downstream `task` / `test`
                                           #            agents what "done" looks like
                                           #            for this component (e.g. "all
                                           #            owned endpoints return 2xx for
                                           #            happy-path fixtures").
    work_units:                            # OPTIONAL but strongly encouraged for non-
                                           #   plumbing components — the method/function
                                           #   CALLABLES this component exposes (C4 interface
                                           #   level). This is the component → CODE seam: the
                                           #   downstream `task` skill slices EXACTLY ONE
                                           #   atomic implementation task per work_unit (its
                                           #   target_symbol = the work_unit `name`), so a
                                           #   component with no work_units yields no
                                           #   implementation task. Enumerate the PUBLIC /
                                           #   contract-bearing callables (those realizing a
                                           #   traced contract or sitting on an internal /
                                           #   external edge) — NOT every private helper.
                                           #   Draft one per owned API operation (controllers),
                                           #   per entity CRUD verb (repositories), or per
                                           #   behaviour the responsibilities /
                                           #   acceptance_criteria imply (services/use_cases).
                                           #   Addressed as (component, name) — there is NO
                                           #   id family. The validator emits a non-blocking
                                           #   WARNING for a non-trivial component that
                                           #   declares none (cross-check 21).
      - name: create_task                  # REQUIRED — the callable's name (method /
                                           #   function / Class.method), e.g. "createTask" or
                                           #   "TasksController.createTask". UNIQUE within
                                           #   THIS component. Becomes the downstream Task's
                                           #   target_symbol (the atomic codegen unit).
        summary: <one line>                # REQUIRED — what this callable does.
        # --- traces: the contract this work_unit realizes (ALL OPTIONAL) ---
        traces_api_operation: create-task  # OPTIONAL — an operation_id from API__*.yaml
                                           #   (controllers / api_clients). Validated ⊆ the
                                           #   API operation set; lets `task`/`test` slice
                                           #   endpoint-level work. The component-level
                                           #   `traces_api_operations` stays the union.
        implements_requirements:           # OPTIONAL — FR-NNN/NFR-NNN this work_unit realizes.
          - FR-001                         #   MUST be ⊆ the OWNING component's
                                           #   implements_requirements (validated).
        touches_entities:                  # OPTIONAL — DATA-MODEL entity name(s) this
          - Task                           #   work_unit reads/writes. Validated ⊆ the
                                           #   entities the owning component traces.
        satisfies_acceptance:              # OPTIONAL — the component acceptance_criterion
          - "Creating a task returns 201 with a persisted id."  # string(s) this fulfils.
        # --- interface contract (codegen-grade). DEFER-OR-DECLARE: a work_unit that
        #     realizes a schema-bearing traced contract (e.g. an API operation whose
        #     request/response schema lives in API__*.yaml) may leave inputs/output/raises
        #     EMPTY and defer to that contract; a domain callable with no schema-bearing
        #     upstream contract (service / use_case methods) DECLARES them so the
        #     independently-generated atomic tasks compose against a frozen interface. ---
        inputs:                            # OPTIONAL — parameter contract (named params /
          - "payload: TaskCreate"          #   types / ENT refs).
        output: Task                       # OPTIONAL — return contract (a type / entity / None).
        raises:                            # OPTIONAL — error / exception contract.
          - "ValidationError -> 400"
        signature: <optional>              # OPTIONAL — concrete language-specific signature,
                                           #   filled ONLY when the signature itself is the
                                           #   contract (public library API). Else codegen
                                           #   renders it from inputs/output + the tech stack.
        status: draft | confirmed          # REQUIRED — interview progress.
    work_units_waiver: <one sentence>      # OPTIONAL — the escape hatch for the #21/#22
                                           #   blocking gates. Set it (alongside
                                           #   work_units: []) when a NON-TRIVIAL component
                                           #   legitimately exposes no standalone callable —
                                           #   realized purely by wiring (a decorator, a
                                           #   composition root) — OR when a specific FR it
                                           #   claims is realized by wiring rather than a
                                           #   named callable. A non-empty waiver downgrades
                                           #   #21 (no work_units) and #22 (FR not pushed to a
                                           #   callable) from blocking to a reviewer-visible
                                           #   WARNING for THIS component. Don't use it to
                                           #   dodge decomposition — use it when a callable
                                           #   breakdown genuinely doesn't apply.
    status: defined | draft | confirmed    # REQUIRED — interview progress

# WORK_UNITS EMISSION STYLE (normative): write each work_unit BLOCK-style — one
# field per line under a `- name:` entry (as shown above). Do NOT use flow-style
# one-liner mappings (`- {name: x, summary: y}`): block-style is diff-reviewable
# and robust to line-oriented tooling. On an update flow, normalize any existing
# flow-style entries to block-style. (Both styles parse identically — the rule is
# about reviewability, and downstream tools MUST parse, never line-grep, to count.)

# ---------------------------------------------------------------------------
# internal_edges — edges between two components inside this container.
# Auto-derived in Phase 6 of container mode; users confirm or edit.
#
# `via_*` fields are OPTIONAL but strongly recommended — they ground the
# edge in an upstream artifact. Pre-fill during derivation whenever the
# evidence is unambiguous.
# ---------------------------------------------------------------------------
internal_edges:                            # OPTIONAL — empty for very small containers
  - from: <component_id>                   # REQUIRED — must exist in components[]
    to: <component_id>                     # REQUIRED — must exist in components[]
    type:                                  # REQUIRED — one of:
      # depends_on | calls | reads | writes | publishes | subscribes_to | implements
    via_resource_id: <api_resource_id>     # OPTIONAL — for `calls` edges into a
                                           #            controller component
    via_unit: <work_unit_name>             # OPTIONAL — for `calls` edges between two
                                           #            components: the WORK_UNIT name on the
                                           #            `to` component being invoked (resolves
                                           #            to a work_units[].name on `to`). The
                                           #            intra-container analogue of an API
                                           #            operation for internal callables.
    via_entity: <PascalCaseEntityName>     # OPTIONAL — for `reads`/`writes` against a
                                           #            repository component
    note: <short string>                   # OPTIONAL

# ---------------------------------------------------------------------------
# external_edges — edges from a component in THIS container to another
# container OR to a specific component inside another container.
# Used by downstream codegen to know which client SDK each component needs.
# ---------------------------------------------------------------------------
external_edges:                            # OPTIONAL
  - from: <component_id>                   # REQUIRED — component in THIS container
    to: <container_id>                     # REQUIRED — either "<container_id>" or
                                           #            "<container_id>/<component_id>"
    type: <enum>                           # REQUIRED — same enum as edges
    via_resource_id: <api_resource_id>     # OPTIONAL — for `calls` edges, the API
                                           #            resource being called. Validated
                                           #            against API__*.yaml.
    via_operation_id: <operation_id>       # OPTIONAL — for `calls` edges, the specific
                                           #            endpoint operation. Validated
                                           #            against API__*.yaml endpoints.
    via_channel_id: <event_channel_id>     # OPTIONAL — for `publishes`/`subscribes_to`,
                                           #            the API.events channel_id.
    via_entity: <PascalCaseEntityName>     # OPTIONAL — for `reads`/`writes` against an
                                           #            external store container.
    note: <string>                         # OPTIONAL

# ---------------------------------------------------------------------------
# arch_warnings — non-fatal issues for THIS container. Universal WRN-NNN
# family: "WRN-NNN: <message>". Counter is writer-managed per sub-session
# (state.last_ids.WRN). Validator enforces `^WRN-\d{3,}:\s+.+`.
# ---------------------------------------------------------------------------
arch_warnings:                             # OPTIONAL — list of "WRN-NNN: ..." strings
  - "WRN-001: TODO: address theme observability"

# =============================================================================
# Required cross-checks (run by validate_schema.py on every write)
# =============================================================================
# In addition to the checks in ARCH.schema.yaml:
#
# 10. owns_api_resources match — every resource_id in `api_surface` must
#     appear in the parent ARCH.yaml.containers[id].owns_api_resources.
# 11. owns_ux_surfaces match — every surface_id in `ux_surface` must
#     appear in the parent ARCH.yaml.containers[id].owns_ux_surfaces.
# 12. persistence match — every store_id in `persistence_bindings` must
#     appear in the parent ARCH.yaml.containers[id].persistence.
# 13. external_edges resolve — every external_edges[].to that references
#     "<container_id>" or "<container_id>/<component_id>" must resolve
#     against the on-disk ARCH.yaml / ARCH__<container>.yaml graph.
# 14. Component trace integrity — for every component:
#       * traces_api_resources   ⊆ resource_ids in docs/API__*.yaml
#       * traces_api_operations  ⊆ operation_ids in docs/API__*.yaml endpoints
#       * traces_ux_surfaces     ⊆ surface_ids in docs/UX__*.yaml
#       * traces_data_entities   ⊆ entity names in docs/DATA-MODEL.yaml.entities
#         (entities only — NOT enums_and_lookups.enums value types)
#     Plus parent containment:
#       * traces_api_resources   ⊆ parent container's owns_api_resources
#       * traces_ux_surfaces     ⊆ parent container's owns_ux_surfaces
#     Cross-check failures force `metadata.status: draft`.
# 15. Edge via_* resolution — for every edge with a via_* field set:
#       * via_resource_id  → must resolve to a resource_id in API__*.yaml
#       * via_operation_id → (external_edges) must resolve to an API operation_id in
#                            API__*.yaml endpoints — an external call to another
#                            container's API surface.
#       * via_unit         → (internal_edges) must resolve to a work_units[].name on the
#                            edge's `to` component — so an INTERNAL (non-API) call names
#                            the callee's method.
#       * via_channel_id   → must resolve to API.events.channels[].channel_id
#       * via_entity       → must resolve to a DATA-MODEL entity name
# 16. Deployment shape compatibility — `deployment.shape` must be
#     compatible with the parent container's `deployment_unit` per the map
#     in the `deployment:` block above.
# 17. External container has no ARCH__*.yaml — if the parent container
#     has `external: true`, this file should not exist; if it does, the
#     validator emits a warning (not a fail).
# 18. Component PRD-trace integrity — for every component:
#       * implements_requirements  → FR-NNN/NFR-NNN format + exists in PRD.yaml
#         (FR resolves against functional_requirements, NFR against
#         non_functional_requirements) AND ⊆ the parent container's
#         implements_requirements.
#       * traces_prd_workflows     → WKF-NNN format + exists in PRD.yaml.
# 19. WRN-NNN format — every arch_warnings entry matches `^WRN-\d{3,}:\s+.+`.
# 20. code_location coverage (advisory, non-blocking) — a non-trivial component
#     (archetype not in {config_loader, serializer, observability_bootstrap,
#     error_handler} and carrying at least one trace) with an empty/absent
#     code_location emits a WARNING: downstream `task`/codegen will have to
#     infer its file placement. Does NOT block status: complete (placement can
#     legitimately be deferred), but filling it is what makes "mostly
#     autonomous" downstream codegen actually hold.
# 21. Component work_units — for every work_units[] entry on every component:
#       * name is non-empty and UNIQUE within its owning component (work_units are
#         addressed as (component, name) — there is NO id family). It is the stable
#         handle the downstream `task` skill references as a Task.target_symbol.
#       * summary is non-empty (required per work_unit).
#       * traces_api_operation       → resolves to an operation_id in API__*.yaml.
#       * implements_requirements     → FR-NNN/NFR-NNN format + exists in PRD.yaml
#         AND ⊆ the OWNING component's implements_requirements.
#       * touches_entities            → ⊆ the owning component's traces_data_entities
#         (and a DATA-MODEL entity name).
#     Cross-check failures force `metadata.status: draft`. The work_units LIST is
#     still OPTIONAL for a trivial/plumbing component, BUT a NON-TRIVIAL component
#     (same set as #20: non-plumbing archetype carrying implements_requirements or
#     a traced contract) that declares NO work_units now BLOCKS `complete` —
#     unless it records a non-empty `work_units_waiver`. This is the blocking
#     upgrade: without it a container could be "complete" while downstream `task`
#     silently seeds no implementation task for a third of its components. The
#     count is taken from a real YAML PARSE (block- and flow-style entries both
#     count) — never a line-grep, which would miss flow-style units.
# 22. Component FR → work_unit coverage — for every component that declares at
#     least one work_unit: every FR-NNN in the component's implements_requirements
#     must appear in at least one of that component's work_units[].implements_
#     requirements. Containment (#21) only checks the reverse (unit FRs ⊆ component
#     FRs), so without #22 a component could claim an FR at the seam yet realize it
#     in NO callable — leaving `task` with no atomic task that builds the feature.
#     Failures BLOCK `complete`; waivable per component via `work_units_waiver`
#     (e.g. an FR realized purely by wiring). NFR-NNN are out of scope (frequently
#     cross-cutting). The validator also prints a per-container advisory roll-up of
#     the FRs unreachable through ANY work_unit.
# =============================================================================
