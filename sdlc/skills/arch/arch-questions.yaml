  - theme: per_component_deepdive
    id: implements_requirements
    schema_path: component.implements_requirements
    question: "Which PRD must-have features (FR-NNN) does this component implement?"
    hint: >
      Reference FR-NNN by stable id. Must be a SUBSET of the parent
      container's implements_requirements (a component can't implement a
      feature its container doesn't own). Validated for FR-NNN format,
      existence in PRD.yaml, and parent containment. Empty for plumbing
      components (config-loader, serializer, etc.).
    suggested_answers: []
    free_text_allowed: true
    required: false
    confidence_field: false
