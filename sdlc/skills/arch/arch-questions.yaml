  # =========================================================================
  # CONTAINER MODE — internal_and_external_edges (critical synthesis)
  # =========================================================================

  - theme: internal_and_external_edges
    id: confirm_internal
    schema_path: internal_edges
    question: "Confirm the derived internal edges between components (or edit per row)?"
    hint: >
      Derivation rules:
       * controller → service (calls)  ⇒ pre-fill via_resource_id +
         via_operation_id when the controller component traces them.
       * service → repository (calls)  ⇒ pre-fill via_entity.
       * repository → cache_client     ⇒ reads/writes (pre-fill via_entity).
       * service → event_handler       ⇒ publishes (pre-fill via_channel_id).
      See references/edge-derivation.md.
    suggested_answers:
      - "confirm all"
      - "remove specific edges"
      - "add specific edges"
      - "retype specific edges"
      - "edit via_* fields"
    free_text_allowed: true
    required: true
    importance: critical

  - theme: internal_and_external_edges
    id: confirm_external
    schema_path: external_edges
    question: "Confirm the derived external edges (component → other-container)?"
    hint: >
      Derivation:
       * api_client → backend container that owns the called resource
         (pre-fill via_resource_id and via_operation_id when known).
       * event_handler subscribing to a channel → the bus container
         (pre-fill via_channel_id).
       * repository → primary-database (pre-fill via_entity).
      Pre-fill via_* from API + DATA bindings whenever evidence is
      unambiguous.
    suggested_answers:
      - "confirm all"
      - "remove specific edges"
      - "add specific edges"
      - "retype specific edges"
      - "edit via_* fields"
    free_text_allowed: true
    required: true
    importance: critical
