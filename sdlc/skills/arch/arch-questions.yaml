  - theme: per_component_deepdive
    id: failure_modes
    schema_path: component.failure_modes
    question: "Up to 3 component-level failure modes (id, description, likelihood, impact, mitigation)?"
    hint: >
      Component-level structured failures, mirroring the container-level
      shape (id, description, likelihood, impact, mitigation). Drives
      unit-test negative cases. A bare string is also accepted (backwards
      compat) and treated as { id: auto, description: <string> }.
    suggested_answers: []
    free_text_allowed: true
    required: false
    confidence_field: false
