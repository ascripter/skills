  primary_store_confidence: inferred
  primary_store_rationale: "Typical web app default; relational fit for Task/User; PRD did not specify a preference."
  polyglot: false
  secondary_stores: []
  file_blob_store: none
  file_blob_store_bucket: null
  file_blob_store_rationale: "No file/blob features in PRD FR-001/FR-002."

# -----------------------------------------------------------------------------
# id_strategy — primary-key generation scheme
# -----------------------------------------------------------------------------
id_strategy:
  scheme: uuid_v7
  scheme_confidence: confirmed
  scheme_rationale: "Time-orderable, non-leaky surrogate keys; good fit for a web app's REST/JSON IDs."
  natural_keys: []

# -----------------------------------------------------------------------------
# entities — Task (core domain) + User (auth context implied by UX entry_conditions)
# -----------------------------------------------------------------------------
entities:
  Task:
    description: "A unit of work tracked in Acme Tasks. Created via the quick-add shortcut and listed on the dashboard."
    primary_key: id
    fields:
      id:
        type: uuid
        nullable: false
        primary_key: true
        unique: true
        comment: "uuid_v7 surrogate key."
      title:
        type: string
        nullable: false
        comment: "Short user-entered task title; main payload of the quick-add flow."
      status:
        type: enum
        nullable: false
        default: "'open'"
        comment: "TaskStatus enum — open | done."
      owner_id:
        type: uuid
        nullable: false
        references: "User.id"
        on_delete: restrict
        comment: "Owner of the task; FK to User.id."
      created_at:
        type: timestamptz
        nullable: false
        default: "now()"
      updated_at:
        type: timestamptz
        nullable: false
        default: "now()"
    traces_prd_features:
      - "FR-001"
      - "FR-002"
    traces_ux_surfaces:
      - "dashboard"
  User:
    description: "Authenticated end-user who owns tasks and operates the dashboard."
    primary_key: id
    fields:
      id:
        type: uuid
        nullable: false
        primary_key: true
        unique: true
        comment: "uuid_v7 surrogate key."
      email:
        type: string
        nullable: false
        unique: true
        comment: "Login identifier; case-insensitive."
      display_name:
        type: string
        nullable: true
        comment: "Optional display name shown in UI."
      created_at:
        type: timestamptz
        nullable: false
        default: "now()"
      updated_at:
        type: timestamptz
        nullable: false
        default: "now()"
    traces_prd_features:
      - "FR-001"
      - "FR-002"
    traces_ux_surfaces:
      - "dashboard"

