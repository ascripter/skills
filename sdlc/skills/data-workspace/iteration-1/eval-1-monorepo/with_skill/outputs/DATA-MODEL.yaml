# =============================================================================
# products — one block per product slug in PRD.products.
# Each block mirrors the single-product shape.
# =============================================================================
products:

  # ---------------------------------------------------------------------------
  # auth — OIDC identity, refresh tokens, admin console (Go server)
  # ---------------------------------------------------------------------------
  auth:

    persistence:
      primary_store: postgres
      primary_store_confidence: confirmed
      primary_store_rationale: "Relational with strong constraints fits identity/session data; well-supported in Go."
      polyglot: false
      secondary_stores: []
      file_blob_store: none

    id_strategy:
      scheme: uuid_v7
      scheme_confidence: confirmed
      scheme_rationale: "Time-orderable UUIDs avoid volume leakage and keep inserts B-tree-friendly."
      natural_keys: []

    entities:

      User:
        description: "End user authenticated via OIDC."
        primary_key: id
        fields:
          id:
            type: uuid
            nullable: false
            primary_key: true
            unique: true
          email:
            type: string
            nullable: false
            unique: true
            comment: "Login identifier; case-insensitive."
          subject:
            type: string
            nullable: false
            unique: true
            comment: "OIDC sub claim from the upstream identity provider."
          tenant_id:
            type: uuid
            nullable: false
            comment: "Tenant scope; FK to Tenant when modelled later."
          status:
            type: string
            nullable: false
            default: "active"
            comment: "active | disabled | pending."
          created_at:
            type: timestamptz
            nullable: false
            default: "now()"
          updated_at:
            type: timestamptz
            nullable: false
            default: "now()"
        traces_prd_features: ["F-001", "F-002"]
        traces_ux_surfaces: []

      Session:
        description: "Active authenticated session tied to a User."
        primary_key: id
        fields:
          id:
            type: uuid
            nullable: false
            primary_key: true
            unique: true
          user_id:
            type: uuid
            nullable: false
            references: "User.id"
            on_delete: cascade
          issued_at:
            type: timestamptz
            nullable: false
            default: "now()"
          expires_at:
            type: timestamptz
            nullable: false
          ip_address:
            type: string
            nullable: true
            comment: "Remote IP captured at issue time (PII-adjacent)."
          user_agent:
            type: string
            nullable: true
          revoked_at:
            type: timestamptz
            nullable: true
          created_at:
            type: timestamptz
            nullable: false
            default: "now()"
        traces_prd_features: ["F-001"]
        traces_ux_surfaces: []

      RefreshToken:
        description: "Rotating refresh token associated with a Session and User."
        primary_key: id
        fields:
          id:
            type: uuid
            nullable: false
            primary_key: true
            unique: true
          user_id:
            type: uuid
            nullable: false
            references: "User.id"
            on_delete: cascade
          session_id:
            type: uuid
            nullable: false
            references: "Session.id"
            on_delete: cascade
          token_hash:
            type: string
            nullable: false
            unique: true
            comment: "Hash of the issued refresh token; raw value is never stored."
          issued_at:
            type: timestamptz
            nullable: false
            default: "now()"
          expires_at:
            type: timestamptz
            nullable: false
          rotated_from:
            type: uuid
            nullable: true
            references: "RefreshToken.id"
            on_delete: set_null
            comment: "Predecessor token (rotation chain)."
          revoked_at:
            type: timestamptz
            nullable: true
          created_at:
            type: timestamptz
            nullable: false
            default: "now()"
        traces_prd_features: ["F-002"]
        traces_ux_surfaces: []

      AdminUser:
        description: "Operator account that can administer tenants and users via the admin console."
        primary_key: id
        fields:
          id:
            type: uuid
            nullable: false
            primary_key: true
            unique: true
          user_id:
            type: uuid
            nullable: false
            unique: true
            references: "User.id"
            on_delete: cascade
            comment: "Admins are a privileged role on top of an existing User."
          role:
            type: string
            nullable: false
            default: "operator"
            comment: "operator | superadmin."
          created_at:
            type: timestamptz
            nullable: false
            default: "now()"
          updated_at:
            type: timestamptz
            nullable: false
            default: "now()"
        traces_prd_features: ["F-003"]
        traces_ux_surfaces: []

    relationships:
      - from_entity: Session
        from_field: user_id
        to_entity: User
        to_field: id
        cardinality: "1:N"
        on_delete: cascade
        comment: "A user has many sessions."
      - from_entity: RefreshToken
        from_field: user_id
        to_entity: User
        to_field: id
        cardinality: "1:N"
        on_delete: cascade
        comment: "A user has many refresh tokens."
      - from_entity: RefreshToken
        from_field: session_id
        to_entity: Session
        to_field: id
        cardinality: "1:N"
        on_delete: cascade
        comment: "Each refresh token belongs to one session."
      - from_entity: RefreshToken
        from_field: rotated_from
        to_entity: RefreshToken
        to_field: id
        cardinality: "1:1"
        on_delete: set_null
        comment: "Rotation chain — self-reference for token lineage."
      - from_entity: AdminUser
        from_field: user_id
        to_entity: User
        to_field: id
        cardinality: "1:1"
        on_delete: cascade
        comment: "Admin privileges attached to a base user."

    enums_and_lookups:
      enums:
        UserStatus: [active, disabled, pending]
        AdminRole: [operator, superadmin]
      lookup_tables: []

    indexes_and_queries:
      access_patterns:
        - description: "Look up user by email at login."
          entity: User
          fields: [email]
          expected_qps: 50
          latency_budget_ms: 50
          read_or_write: read
        - description: "Look up user by OIDC subject at token exchange."
          entity: User
          fields: [subject]
          expected_qps: 100
          latency_budget_ms: 50
          read_or_write: read
        - description: "List active sessions for a user."
          entity: Session
          fields: [user_id, revoked_at]
          expected_qps: 30
          latency_budget_ms: 80
          read_or_write: read
        - description: "Resolve refresh token by hash at refresh."
          entity: RefreshToken
          fields: [token_hash]
          expected_qps: 200
          latency_budget_ms: 30
          read_or_write: read
      expected_indexes:
        - entity: User
          fields: [email]
          unique: true
          type: btree
        - entity: User
          fields: [subject]
          unique: true
          type: btree
        - entity: Session
          fields: [user_id]
          unique: false
          type: btree
        - entity: RefreshToken
          fields: [token_hash]
          unique: true
          type: btree
        - entity: RefreshToken
          fields: [session_id]
          unique: false
          type: btree

    integrity_and_constraints:
      default_on_delete: restrict
      default_on_delete_rationale: "Restrict surfaces orphan-risks at delete time; explicit cascade only where lifecycle is owned."
      unique_constraints:
        - entity: User
          fields: [tenant_id, email]
          name: uq_user_tenant_email
      check_constraints:
        - entity: Session
          expression: "expires_at > issued_at"
          name: ck_session_expiry
        - entity: RefreshToken
          expression: "expires_at > issued_at"
          name: ck_refresh_expiry

    data_classification:
      pii_fields:
        - "User.email"
        - "User.subject"
        - "Session.ip_address"
        - "Session.user_agent"
      pii_fields_confidence: confirmed
      regulated_fields: []
      encrypted_at_rest:
        - "RefreshToken.token_hash"
      encryption_kms_ref: "none"
      retention_policy_default: "Indefinite"

  # ---------------------------------------------------------------------------
  # billing — invoice generation + Stripe payment sync (TypeScript server)
  # ---------------------------------------------------------------------------
  billing:

    persistence:
      primary_store: postgres
      primary_store_confidence: confirmed
      primary_store_rationale: "Money + invoicing demands ACID; postgres NUMERIC handles currency precisely."
      polyglot: false
      secondary_stores: []
      file_blob_store: none

    id_strategy:
      scheme: uuid_v7
      scheme_confidence: confirmed
      scheme_rationale: "Aligns with auth product; time-orderable IDs help invoice listing pagination."
      natural_keys: []

    entities:

      Invoice:
        description: "Monthly invoice issued to a tenant."
        primary_key: id
        fields:
          id:
            type: uuid
            nullable: false
            primary_key: true
            unique: true
          tenant_id:
            type: uuid
            nullable: false
            comment: "Tenant the invoice belongs to (cross-product reference)."
          invoice_number:
            type: string
            nullable: false
            unique: true
            comment: "Human-readable sequential number per tenant, e.g. INV-2026-000123."
          status:
            type: string
            nullable: false
            default: "draft"
            comment: "draft | open | paid | void | uncollectible."
          currency:
            type: string
            nullable: false
            default: "USD"
            comment: "ISO-4217 three-letter code."
          subtotal_cents:
            type: bigint
            nullable: false
            default: "0"
          total_cents:
            type: bigint
            nullable: false
            default: "0"
          period_start:
            type: date
            nullable: false
          period_end:
            type: date
            nullable: false
          issued_at:
            type: timestamptz
            nullable: true
          due_at:
            type: timestamptz
            nullable: true
          paid_at:
            type: timestamptz
            nullable: true
          created_at:
            type: timestamptz
            nullable: false
            default: "now()"
          updated_at:
            type: timestamptz
            nullable: false
            default: "now()"
        traces_prd_features: ["F-001"]
        traces_ux_surfaces: []

      LineItem:
        description: "One billable line on an Invoice (description + quantity + unit price)."
        primary_key: id
        fields:
          id:
            type: uuid
            nullable: false
            primary_key: true
            unique: true
          invoice_id:
            type: uuid
            nullable: false
            references: "Invoice.id"
            on_delete: cascade
          description:
            type: string
            nullable: false
          quantity:
            type: decimal
            nullable: false
            default: "1"
          unit_price_cents:
            type: bigint
            nullable: false
          amount_cents:
            type: bigint
            nullable: false
            comment: "quantity * unit_price_cents, denormalised for fast aggregation."
          created_at:
            type: timestamptz
            nullable: false
            default: "now()"
        traces_prd_features: ["F-001"]
        traces_ux_surfaces: []

      Payment:
        description: "Payment attempt or settlement against an Invoice (sourced from Stripe)."
        primary_key: id
        fields:
          id:
            type: uuid
            nullable: false
            primary_key: true
            unique: true
          invoice_id:
            type: uuid
            nullable: false
            references: "Invoice.id"
            on_delete: restrict
          stripe_payment_intent_id:
            type: string
            nullable: false
            unique: true
            comment: "Stripe PaymentIntent identifier; idempotency key."
          amount_cents:
            type: bigint
            nullable: false
          currency:
            type: string
            nullable: false
          status:
            type: string
            nullable: false
            comment: "pending | succeeded | failed | refunded."
          received_at:
            type: timestamptz
            nullable: false
            default: "now()"
          created_at:
            type: timestamptz
            nullable: false
            default: "now()"
          updated_at:
            type: timestamptz
            nullable: false
            default: "now()"
        traces_prd_features: ["F-002"]
        traces_ux_surfaces: []

      StripeEvent:
        description: "Raw Stripe webhook event, persisted for idempotency + audit."
        primary_key: id
        fields:
          id:
            type: uuid
            nullable: false
            primary_key: true
            unique: true
          stripe_event_id:
            type: string
            nullable: false
            unique: true
            comment: "Stripe's own event id (evt_*); idempotency guarantee."
          type:
            type: string
            nullable: false
            comment: "Stripe event type, e.g. 'payment_intent.succeeded'."
          payload:
            type: jsonb
            nullable: false
            comment: "Full raw event body for replay."
          payment_id:
            type: uuid
            nullable: true
            references: "Payment.id"
            on_delete: set_null
            comment: "Linked Payment when the event applies to one."
          received_at:
            type: timestamptz
            nullable: false
            default: "now()"
          processed_at:
            type: timestamptz
            nullable: true
        traces_prd_features: ["F-002"]
        traces_ux_surfaces: []

    relationships:
      - from_entity: LineItem
        from_field: invoice_id
        to_entity: Invoice
        to_field: id
        cardinality: "1:N"
        on_delete: cascade
        comment: "An invoice has many line items."
      - from_entity: Payment
        from_field: invoice_id
        to_entity: Invoice
        to_field: id
        cardinality: "1:N"
        on_delete: restrict
        comment: "An invoice may have multiple payment attempts; never cascade-delete payments."
      - from_entity: StripeEvent
        from_field: payment_id
        to_entity: Payment
        to_field: id
        cardinality: "1:N"
        on_delete: set_null
        comment: "Webhook events link to a Payment when applicable."

    enums_and_lookups:
      enums:
        InvoiceStatus: [draft, open, paid, void, uncollectible]
        PaymentStatus: [pending, succeeded, failed, refunded]
      lookup_tables: []

    indexes_and_queries:
      access_patterns:
        - description: "List invoices for a tenant, newest first."
          entity: Invoice
          fields: [tenant_id, created_at]
          expected_qps: 10
          latency_budget_ms: 100
          read_or_write: read
        - description: "Find invoice by invoice_number."
          entity: Invoice
          fields: [invoice_number]
          expected_qps: 5
          latency_budget_ms: 50
          read_or_write: read
        - description: "List line items on an invoice."
          entity: LineItem
          fields: [invoice_id]
          expected_qps: 10
          latency_budget_ms: 50
          read_or_write: read
        - description: "Stripe webhook idempotency lookup."
          entity: StripeEvent
          fields: [stripe_event_id]
          expected_qps: 20
          latency_budget_ms: 30
          read_or_write: read
        - description: "Resolve payment by Stripe payment intent."
          entity: Payment
          fields: [stripe_payment_intent_id]
          expected_qps: 20
          latency_budget_ms: 30
          read_or_write: read
      expected_indexes:
        - entity: Invoice
          fields: [tenant_id, created_at]
          unique: false
          type: composite
        - entity: Invoice
          fields: [invoice_number]
          unique: true
          type: btree
        - entity: LineItem
          fields: [invoice_id]
          unique: false
          type: btree
        - entity: Payment
          fields: [stripe_payment_intent_id]
          unique: true
          type: btree
        - entity: StripeEvent
          fields: [stripe_event_id]
          unique: true
          type: btree

    integrity_and_constraints:
      default_on_delete: restrict
      default_on_delete_rationale: "Financial data must never silently disappear; restrict forces explicit handling."
      unique_constraints:
        - entity: Invoice
          fields: [tenant_id, invoice_number]
          name: uq_invoice_tenant_number
      check_constraints:
        - entity: Invoice
          expression: "total_cents >= 0"
          name: ck_invoice_total_nonneg
        - entity: LineItem
          expression: "amount_cents = quantity * unit_price_cents"
          name: ck_lineitem_amount
        - entity: Payment
          expression: "amount_cents > 0"
          name: ck_payment_amount_positive

    data_classification:
      pii_fields:
        - "Invoice.tenant_id"
      pii_fields_confidence: inferred
      regulated_fields:
        - "Payment.stripe_payment_intent_id"
        - "StripeEvent.payload"
      regulated_fields_confidence: inferred
      encrypted_at_rest: []
      encryption_kms_ref: "none"
      retention_policy_default: "7 years"

    external_data_sources:
      - name: stripe
        sync_model: webhook
        conflict_resolution: "Stripe is source of truth for payment status; persist last-seen event."
        refresh_interval: "real-time (webhook)"
        maps_to_entity: Payment
