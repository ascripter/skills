# =============================================================================
# DATA-MODEL.yaml — Canonical Schema Reference (persistent data model)
# =============================================================================
# Documents the full structure of docs/DATA-MODEL.yaml. NOT a runtime config — it
# is the human-readable source of truth that `validate_schema.py` enforces.
#
# Two top-level shapes are supported, mirroring PRD.yaml / UX.yaml / API.yaml:
#   1. SINGLE-PRODUCT (default): theme blocks live at the top level.
#   2. MULTI-PRODUCT (monorepo): themes live under `products.<slug>.<theme>`.
#      Triggered when the upstream PRD has `metadata.monorepo: true`.
#
# Conventions:
#   - `null` (not omission) means "explicitly unanswered".
#   - For trade-off fields, a sibling `<field>_rationale` (string) captures
#     the *why*.
#   - For pre-filled answers, a sibling `<field>_confidence` captures
#     certainty: confirmed | inferred | assumption.
#   - Enum values are lowercase snake_case strings.
#   - Entity names are PascalCase (e.g. `User`, `Order`, `LineItem`).
#   - Field names are snake_case (e.g. `created_at`, `user_id`).
#   - `data_classification` lists fields by `Entity.field` reference, not
#     inline on each field. Downstream agents cross-reference both blocks.
#
# ID conventions (format is always "<PREFIX>-NNN" with zero-padded 3-digit
# numbers, NNN ≥ 001):
#
#   Families this skill EMITS:
#     WRN — `data_warnings[]`. Writer-managed: every entry is prefixed
#           `"WRN-NNN: <message>"` and the counter `state.last_ids.WRN`
#           (or `state.last_ids_by_product[<slug>].WRN` in monorepo mode)
#           is persisted after each append.
#
#   (Entities themselves are addressed by their PascalCase dict key — `User`,
#   `Order`. The matching upstream `ENT-NNN` id lives in
#   `PRD.data_model.key_entities` as `"ENT-NNN: <Name>"`; the dict key here
#   is the unprefixed name. No fresh entity-level ID family is emitted.)
#
#   Families this skill CONSUMES from `docs/PRD.yaml` (verbatim — never
#   renumber, never invent new items in these families):
#     FR  — `PRD.functional_requirements.must_have_features` and
#           `nice_to_have_features` — referenced from
#           `entities.<E>.traces_prd_features`. Drives the feature-coverage
#           cross-check (every PRD must-have FR-NNN must be traced by ≥1
#           entity or land in a `data_warnings` deferral).
#     WKF — `PRD.use_cases.core_workflows` — referenced from optional
#           `entities.<E>.traces_prd_workflows`. Catches entities the
#           model implies via a workflow even when no FR-NNN directly
#           names them.
#     ENT — `PRD.data_model.key_entities` (each entry is `"ENT-NNN: <Name>"`).
#           Entries here pre-seed the `entities` dict keys: the agent
#           strips the `ENT-NNN: ` prefix and treats the remainder
#           (`<Name>` or `<Name> — <description>`) as the PascalCase
#           entity name. Treated as `✓ found` candidates during Phase 3
#           entity discovery.
#
#   Families this skill CONSUMES from `docs/UX.yaml` (verbatim — never
#   renumber, never invent new items in these families):
#     SCR — `UX.surface_inventory[].id` — referenced from
#           `entities.<E>.traces_ux_surfaces`. SCR-NNN is the stable id;
#           the slug `surface_id` is editable and MUST NOT appear here.
#
#   The validator enforces:
#     * WRN-NNN format on every `data_warnings[]` entry.
#     * FR-NNN format on every value in `entities.<E>.traces_prd_features`.
#     * SCR-NNN format on every value in `entities.<E>.traces_ux_surfaces`.
#     * WKF-NNN format on every value in `entities.<E>.traces_prd_workflows`.
#     Values carrying the wrong prefix are warnings in `status: draft`,
#     errors in `status: complete`.
#
#   In monorepo mode, the WRN counter resets per product
#   (`state.last_ids_by_product[<slug>].WRN`). PRD/UX ID consumption draws
#   from the matching product's PRD/UX subtree.
# =============================================================================

# -----------------------------------------------------------------------------
# metadata — always at top level, present in both single- and multi-product mode
# -----------------------------------------------------------------------------
metadata:
  data_model_version: "1.1"                # schema version this file conforms to
  last_updated: "2026-05-25T12:00:00Z"     # ISO-8601 UTC timestamp of last write
  generated_by: sdlc-data                  # always literal string "sdlc-data"
  session_id: "00000000-0000-0000-0000-000000000000"  # UUID of the interview session
  monorepo: false                          # mirrors PRD.metadata.monorepo
  status: "draft"                          # "draft" | "complete"
                                           # writer sets to "complete" only when:
                                           #   1) all required fields are filled,
                                           #   2) the validator passes schema +
                                           #      every cross-check (feature
                                           #      coverage, relationship integrity,
                                           #      classification integrity,
                                           #      bounded-context partition,
                                           #      mode-mismatch, volume-vs-scale).
  changelog: null                          # Optional[list[string]]. Append-only.
                                           # Each entry one line, format:
                                           #   "<version> (<YYYY-MM-DD>): <one-line summary>"
                                           # Most-recent entry first. Used to record
                                           # post-generation manual edits or skill
                                           # re-runs that materially changed the file.
  upstream_provenance: null                # Optional[list[mapping]]. One entry per
                                           # upstream artifact consumed, each a mapping:
                                           #   {file, session_id, last_updated, sha256}
                                           # sha256 = the 16-hex prefix from
                                           # docs/INDEX.yaml.generated_from[<file>].
                                           # Re-runs compare this to detect upstream
                                           # drift. Validator type-checks list-of-
                                           # mappings only. See CLAUDE.md §7
                                           # "Upstream-change re-invocation".

# data_warnings — informational notes carried into downstream agent context.
# Each entry MUST start with a stable ID: "WRN-NNN: <message>".
# IDs are assigned in collection order by the writer (WRN-001, WRN-002, …)
# and are stable across re-runs. The writer-managed counter lives in
# `state.last_ids.WRN`.
#
# Use for:
#   * uncovered PRD FR-NNN features ("WRN-NNN: coverage: FR-007 has no entity trace")
#   * surface-coverage gaps ("WRN-NNN: surface SCR-004 has no entity trace")
#   * classification orphans ("WRN-NNN: data_classification.pii_fields[2] = User.foo not in User")
#   * low-confidence answers
#   * merge conflicts
#   * deferred optional themes (now/skip/todo) recorded for downstream visibility
#   * entities dropped from the scope-completeness sweep with the user's "defer" decision
data_warnings: []                          # list[string] of "WRN-NNN: <msg>" items

# =============================================================================
# SINGLE-PRODUCT MODE — themes at top level, in interview order
# (omit the entire `products:` key in this mode)
# =============================================================================

# -----------------------------------------------------------------------------
# persistence — modelled as TWO ORTHOGONAL AXES plus the primary durable store
# and any secondary stores (cache, blob, search). Pre-filled from
# PRD.data_model.storage_preferences.
#
#   AXIS 1 — `paradigm` (the FAMILY: the data shape). THE DISCRIMINATOR for the
#     whole document; decides which theme blocks are required and which validator
#     cross-checks run.
#   AXIS 2 — `topology` (WHERE/HOW the store runs). Orthogonal to the family — a
#     `relational` family may run self-hosted (networked_server), managed
#     (cloud_managed), or embedded (local_embedded). Captured independently;
#     NOT a discriminator (never changes the required set). Optional + back-compat.
#
# `paradigm` is chosen early (Phase 4) — the agent recommends one from PRD
# signals, the user confirms; `topology` is recommended in the same step.
# Absence of `paradigm` defaults to `relational` so pre-paradigm files validate
# unchanged.
#
#   paradigm      required blocks (besides entities + data_classification)   shape of `entities`
#   ----------    ---------------------------------------------------------  -------------------------------------
#   relational    id_strategy, relationships, indexes_and_queries,           fields: type/nullable/unique/
#                 integrity_and_constraints                                  primary_key/references/on_delete
#   document      id_strategy, indexes_and_queries (+ composition for        fields: type/nullable; embedded
#                 embedded docs, cross_references for id links)              sub-docs via composition
#   key_value     key_value_design                                          fields + key design in
#                                                                           key_value_design.key_patterns
#   graph         edges (+ graph_config)                                    nodes with node_label + properties;
#                                                                           edges are first-class (no join table)
#   vector        vector_config                                             collections: payload_fields +
#                                                                           one field with embedding: true
#   file_native   identity_conventions (+ composition, cross_references,    fields: pydantic_type + description;
#                 serialization_conventions)                                identity is path-derived (no PK)
#
# Blocks NOT listed for a paradigm are optional/ignored there. Relational-only
# blocks (relationships with on_delete, indexes_and_queries, integrity_and_
# constraints, scale_and_retention, migrations_and_evolution, transactions_and_
# consistency) carry no meaning for graph/vector/file_native and may be omitted.
# -----------------------------------------------------------------------------
persistence:
  paradigm: null                   # REQUIRED in practice (defaults to
                                   # `relational` when absent). One of:
                                   #   relational | document | key_value |
                                   #   graph | vector | file_native
  paradigm_confidence: null        # confirmed | inferred | assumption
  paradigm_rationale: null         # string — why this paradigm? (agent's
                                   # recommendation reasoning + user's call)
  topology: null                   # RECOMMENDED — the orthogonal axis: where/how
                                   # the primary store runs. One of:
                                   #   local_embedded   | networked_server |
                                   #   cloud_managed    | serverless       |
                                   #   in_memory        | other
                                   # Optional (back-compat); absence = "not yet
                                   # decided". Concrete provider is finalized at
                                   # the deploy stage — this is the shape the
                                   # data model assumes.
  topology_confidence: null        # confirmed | inferred | assumption
  topology_rationale: null         # string — why this topology?
  primary_store: null              # REQUIRED — concrete store technology. One of:
                                   #   relational: postgres | mysql | sqlite |
                                   #               sqlserver | oracle
                                   #   document:   mongodb | firestore | couchbase
                                   #   key_value:  dynamodb | redis | etcd
                                   #   graph:      neo4j | arangodb | neptune |
                                   #               janusgraph
                                   #   vector:     pinecone | qdrant | weaviate |
                                   #               milvus | chroma | pgvector |
                                   #               lancedb
                                   #   file_native: filesystem
                                   #   (or `other`)
  primary_store_confidence: null   # confirmed | inferred | assumption
  primary_store_rationale: null    # string — why this store?
  serialization_format: null       # file_native only — yaml | json | toml | other
  polyglot: false                  # bool — true if any secondary_stores present
  secondary_stores: null           # list[SecondaryStore]; each:
                                   #   - kind: redis | memcached | elasticsearch |
                                   #           opensearch | meilisearch | kafka |
                                   #           rabbitmq | clickhouse | duckdb | other
                                   #     role: cache | search | queue | analytics |
                                   #           timeseries | other
                                   #     rationale: string
  secondary_stores_confidence: null  # confirmed | inferred | assumption
                                   # certainty of the secondary-store inventory as a whole
  file_blob_store: null            # one of: none | s3 | gcs | azure_blob |
                                   #         minio | local_fs | other
  file_blob_store_bucket: null     # string — bucket / container / mount path
  file_blob_store_rationale: null  # string — why this blob store?

# -----------------------------------------------------------------------------
# id_strategy — primary-key generation scheme + natural-key policy.
# PARADIGM: required for relational + document. For file_native, identity is
# path-derived (see identity_conventions); for key_value/graph/vector the key
# lives in key_value_design / node identity / point id respectively — omit this
# block there.
# -----------------------------------------------------------------------------
id_strategy:
  scheme: null                     # REQUIRED — one of:
                                   #   uuid_v4 | uuid_v7 | ulid | nanoid |
                                   #   serial_int | bigserial | natural_key | mixed
  scheme_confidence: null
  scheme_rationale: null           # string — why this scheme?
  natural_keys: null               # list[NaturalKey]; each:
                                   #   - entity: PascalCaseEntityName
                                   #     fields: [snake_case, ...]   # composite OK
                                   #     reason: string

# -----------------------------------------------------------------------------
# entities — the heart of the data model. Dict keyed by PascalCaseEntityName.
# Each entity carries its fields, primary key, and traceability back to PRD
# features / UX surfaces.
# -----------------------------------------------------------------------------
entities:                          # REQUIRED — dict[<PascalCaseEntityName>, Entity]
                                   # MUST be non-empty in status: complete.
  User:                            # example entity
    description: "Authenticated end-user of the platform."
    primary_key: id                # string OR list[string] (composite). REQUIRED
                                   # for relational/document; omit for
                                   # file_native (path-derived) / key_value /
                                   # graph / vector.
    # --- paradigm-specific entity attributes (all optional) ---
    # category: stage_artifact     # file_native — discriminator (free string)
    # composes: [ArtifactBase]     # file_native — Pydantic mixins this extends
    # serialization:               # file_native — on-disk placement
    #   scope: per_stage           #   per_stage | per_project | nested_in:<E> | runtime_only
    #   filename_pattern: "02_product_requirements.yaml"
    # node_label: User             # graph — node label (defaults to entity key)
    # payload_fields: [title, body]# vector — fields stored alongside the vector
    fields:                        # REQUIRED — dict[snake_case, Field]
      id:
        # relational/document: a SQL-ish column type from the enum below.
        type: uuid                 # one of: uuid | string | text | int | bigint |
                                   #         decimal | float | bool | date | time |
                                   #         timestamp | timestamptz | json | jsonb |
                                   #         enum | binary | blob | array | other
        # file_native: use `pydantic_type` + `description` INSTEAD of `type`.
        # pydantic_type: str       #   literal Python type expr, e.g.
                                   #   "Optional[list[FeatureSpec]]". Optionality
                                   #   is encoded in the type, not `nullable`.
        # vector: mark the embedding-source field.
        # embedding: true          #   the vector is computed from this field
        nullable: false            # bool — default false (relational/document)
        primary_key: true          # bool — default false
        unique: true               # bool — default false
        default: null              # string | null — SQL/codegen default expression
        references: null           # null OR "<Entity>.<field>" string (FK;
                                   #   relational/document)
        on_delete: null            # one of: cascade | restrict | set_null |
                                   #         no_action (applies only if references)
        check: null                # string — check constraint expression
        comment: null              # string — human-readable note
        description: null          # string — preferred note field for file_native
      email:
        type: string
        nullable: false
        unique: true
        comment: "Login identifier; case-insensitive."
      created_at:
        type: timestamptz
        nullable: false
        default: "now()"
    traces_prd_features: ["FR-001"] # REQUIRED list[string] of "FR-NNN" ids (no
                                   # verbatim PRD text). FR ids come from
                                   # PRD.functional_requirements.must_have_features /
                                   # nice_to_have_features. Empty list `[]` is valid
                                   # for purely-backend entities (e.g. AuditLog);
                                   # `null` is rejected by the validator.
                                   # Drives the feature-coverage cross-check at
                                   # validation: every PRD must_have FR-NNN must
                                   # be traced by ≥1 entity (or deferred via a
                                   # WRN-NNN entry in data_warnings).
    traces_ux_surfaces: null       # list[string] of "SCR-NNN" ids (no kebab slugs).
                                   # SCR ids come from UX.surface_inventory[].id.
                                   # Use SCR-NNN — never the editable slug
                                   # `surface_id`. Empty list `[]` is allowed for
                                   # purely-backend entities.
    traces_prd_workflows: null     # Optional list[string] of "WKF-NNN" ids
                                   # (from PRD.use_cases.core_workflows). Use when
                                   # an entity participates in a workflow even if
                                   # no FR-NNN directly names it. The sweep at
                                   # the end of the entities theme catches entities
                                   # implied by an upstream WKF whose draft list
                                   # missed.

# -----------------------------------------------------------------------------
# relationships — explicit edges between entities. Inline FK references on
# field-level (entities.<E>.fields.<f>.references) are still allowed, but
# this block is the canonical place to express cardinality + cascade rules
# and any many-to-many join tables.
# PARADIGM: required for relational. document may use it for id links (but
# prefer composition/cross_references). For graph use the first-class `edges`
# block instead (no join tables). Omit for key_value/vector/file_native.
# -----------------------------------------------------------------------------
relationships:                     # relational: REQUIRED (list[Relationship];
                                   # may be empty). Other paradigms: omit.
                                   # if the model has no cross-entity edges.
                                   # Each:
  - from_entity: null              # PascalCaseEntityName (must exist in `entities`)
    from_field: null               # snake_case field on from_entity
    to_entity: null                # PascalCaseEntityName (must exist in `entities`)
    to_field: null                 # snake_case field on to_entity
    cardinality: null              # one of: "1:1" | "1:N" | "N:M"
    on_delete: null                # one of: cascade | restrict | set_null | no_action
    on_update: null                # one of: cascade | restrict | set_null | no_action
    join_table: null               # PascalCaseEntityName — required only when
                                   # cardinality == "N:M" (and join_table must
                                   # itself be an entity in `entities`)
    comment: null                  # string — semantics, e.g. "A user has many orders."

# =============================================================================
# PARADIGM-SPECIFIC STRUCTURAL BLOCKS
# Each is optional at the schema level; the validator's paradigm-gated required
# set decides which is mandatory (graph→edges, vector→vector_config,
# key_value→key_value_design, file_native→identity_conventions). All blocks
# below are OMITTED for paradigms that don't use them.
# =============================================================================

# -----------------------------------------------------------------------------
# edges — GRAPH paradigm. First-class relationships between nodes. Unlike
# relational `relationships`, edges carry their own properties and never need a
# join table. Validator checks every from_entity/to_entity resolves to an
# entity key or its node_label.
# -----------------------------------------------------------------------------
edges:                             # graph: REQUIRED (list[Edge]; may be empty
  null                             # for a nodes-only graph). Other paradigms: omit.
  # - type: FOLLOWS                # edge/relationship type (UPPER_SNAKE by convention)
  #   from_entity: User            # must exist in entities (key or node_label)
  #   to_entity: User
  #   cardinality: "N:M"           # "1:1" | "1:N" | "N:M"
  #   direction: directed          # directed | undirected
  #   properties: { since: timestamp }  # dict — edge attributes

# -----------------------------------------------------------------------------
# graph_config — GRAPH paradigm. Node-label inventory + named traversal patterns
# (the graph analogue of relational access_patterns).
# -----------------------------------------------------------------------------
graph_config:                      # graph only
  null
  # node_labels: [User, Post]
  # traversal_patterns:
  #   - description: "Friends-of-friends up to 3 hops."
  #     start_label: User
  #     pattern: "(:User)-[:FOLLOWS*1..3]->(:User)"

# -----------------------------------------------------------------------------
# vector_config — VECTOR paradigm. Embedding model + ANN index configuration.
# Validator requires embedding_model + dimensions + distance_metric.
# -----------------------------------------------------------------------------
vector_config:                     # vector only — REQUIRED for that paradigm
  null
  # embedding_model: "text-embedding-3-large"
  # dimensions: 3072
  # distance_metric: cosine        # cosine | euclidean | dot_product | manhattan
  # ann_index: hnsw                # hnsw | ivf | ivf_flat | ivf_pq | flat | diskann | other
  # index_params: { m: 16, ef_construct: 200 }

# -----------------------------------------------------------------------------
# key_value_design — KEY_VALUE paradigm. Access-pattern-first key design:
# partition/sort key templates and secondary indexes (e.g. DynamoDB GSIs).
# Validator requires non-empty key_patterns; each pattern's entity must resolve.
# -----------------------------------------------------------------------------
key_value_design:                  # key_value only — REQUIRED for that paradigm
  null
  # key_patterns:
  #   - entity: Session
  #     key_template: "user#{user_id}#session#{session_id}"
  #     partition_key: user_id
  #     sort_key: session_id
  # secondary_indexes:
  #   - name: GSI1-by-session
  #     partition_key: session_id
  #     projection: ALL

# -----------------------------------------------------------------------------
# identity_conventions — FILE_NATIVE paradigm (and any keyless paradigm).
# States how entity identity is derived without a generated primary key.
# Validator requires a non-empty `rules` list. Replaces id_strategy.
# -----------------------------------------------------------------------------
identity_conventions:              # file_native — REQUIRED for that paradigm
  null
  # rules:
  #   - "stage_artifact: NO id field; identity is the on-disk path."
  #   - "sub_model: carries its domain ID string (FR-NNN, ENT-NNN); no UUIDs."

# -----------------------------------------------------------------------------
# composition — DOCUMENT / FILE_NATIVE / GRAPH. Pydantic/document-level
# parent→child containment (the demo's Report→Finding nesting). Validator checks
# parent and child both exist in entities.
# -----------------------------------------------------------------------------
composition:                       # optional list[CompositionItem]
  null
  # - parent: ProductRequirements
  #   child: FeatureSpec
  #   kind: contains               # embeds | contains | references
  #   comment: "PR owns its feature specs."

# -----------------------------------------------------------------------------
# cross_references — DOCUMENT / FILE_NATIVE. String-ID reference relations (the
# input contract for referential-integrity gates). Each entry needs EITHER a
# `to_entity` (intra-model link) OR a `references_family` (points at an upstream
# ID family like FR/ENT). Validator checks from_entity/to_entity resolve.
# -----------------------------------------------------------------------------
cross_references:                  # optional list[CrossReference]
  null
  # - from_entity: FeatureSpec
  #   field: id
  #   references_family: FR        # upstream ID family (no local to_entity)
  #   comment: "FeatureSpec.id is an FR-NNN from the PRD."
  # - from_entity: TestSpec
  #   field: covers
  #   to_entity: FeatureSpec       # intra-model link
  #   gate: "covers_resolves"      # name of the validator gate that enforces it

# -----------------------------------------------------------------------------
# serialization_conventions — FILE_NATIVE. Where artifacts live on disk so the
# tree is human-readable (not "Item001, Item002"). Per-entity placement may also
# live inline on entities.<E>.serialization.
# -----------------------------------------------------------------------------
serialization_conventions:         # file_native only
  null
  # root_path: "aicf_artifacts/"
  # format: yaml                   # yaml | json | toml | other
  # entries:
  #   - entity: ProductRequirements
  #     filename_pattern: "02_product_requirements.yaml"
  #     scope: per_stage

# -----------------------------------------------------------------------------
# enums_and_lookups — first-class enum types + entities that act as lookups.
# Lookup entities are real rows in the DB but conceptually closed sets.
# (Universal — applies to every paradigm.)
# -----------------------------------------------------------------------------
enums_and_lookups:                 # REQUIRED — block may be present-but-empty.
  enums: null                      # dict[<EnumName>, list[string]]; e.g.
                                   #   OrderStatus: [pending, paid, shipped, refunded]
  lookup_tables: null              # list[<PascalCaseEntityName>] — entities in
                                   # `entities` that are static lookup tables
                                   # (so codegen can treat them specially).

# -----------------------------------------------------------------------------
# indexes_and_queries — expected query patterns and the indexes that serve them.
# Drives downstream index DDL, query optimisation, and access-pattern review.
# PARADIGM: required for relational + document. graph uses
# graph_config.traversal_patterns, vector uses vector_config, key_value uses
# key_value_design — omit this block for those.
# -----------------------------------------------------------------------------
indexes_and_queries:               # relational/document: REQUIRED (may be
                                   # present-but-empty). Other paradigms: omit.
  access_patterns: null            # list[AccessPattern]; each:
                                   #   - description: string (e.g. "list orders by user, newest first")
                                   #     entity: PascalCaseEntityName
                                   #     fields: [snake_case, ...]
                                   #     expected_qps: float | null
                                   #     latency_budget_ms: int | null
                                   #     read_or_write: read | write | both
  expected_indexes: null           # list[Index]; each:
                                   #   - entity: PascalCaseEntityName
                                   #     fields: [snake_case, ...]
                                   #     unique: bool
                                   #     type: btree | hash | gin | gist |
                                   #           fulltext | composite | other
                                   #     name: string | null (codegen may auto-name)

# -----------------------------------------------------------------------------
# integrity_and_constraints — DB-level invariants beyond per-field constraints.
# PARADIGM: relational only. Document/file_native enforce invariants in app code
# (Pydantic validators); graph/vector/key_value have no FK/check semantics. Omit
# for non-relational paradigms.
# -----------------------------------------------------------------------------
integrity_and_constraints:         # relational: REQUIRED (may be
                                   # present-but-empty). Other paradigms: omit.
  default_on_delete: null          # one of: cascade | restrict | set_null | no_action
                                   # applied to FKs that don't specify their own
  default_on_delete_rationale: null  # string — why this default? (cascade is dangerous;
                                   # restrict surfaces issues at delete time)
  unique_constraints: null         # list[UniqueConstraint]; each:
                                   #   - entity: PascalCaseEntityName
                                   #     fields: [snake_case, ...]   # composite OK
                                   #     name: string | null
  check_constraints: null          # list[CheckConstraint]; each:
                                   #   - entity: PascalCaseEntityName
                                   #     expression: "amount > 0"     # SQL expr
                                   #     name: string | null
                                   #     comment: string | null

# -----------------------------------------------------------------------------
# data_classification — privacy / compliance tagging at the field level.
# Fields are referenced as "Entity.field". Heavily pre-filled from
# PRD.security_compliance (data_sensitivity, regulatory_requirements,
# encryption_at_rest). Downstream `api` uses this to gate DTO exposure;
# `arch` uses it for KMS/segregation decisions.
# -----------------------------------------------------------------------------
data_classification:               # REQUIRED — block may have empty lists.
  pii_fields: null                 # list[string] — "Entity.field" — personally
                                   # identifying information (email, name, phone).
  regulated_fields: null           # list[string] — "Entity.field" — PHI (HIPAA),
                                   # PCI (card data), or other regulated content.
  encrypted_at_rest: null          # list[string] — "Entity.field" — must be
                                   # column-encrypted independent of disk encryption.
  encryption_kms_ref: null         # string — KMS key alias or ARN; e.g.
                                   #   "alias/data-classification-default"
  retention_policy_default: null   # string — default retention; e.g.
                                   #   "Indefinite" | "7 years" | "30 days post-deletion"

