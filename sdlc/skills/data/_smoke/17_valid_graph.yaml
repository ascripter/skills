persistence:
  paradigm: graph
  paradigm_confidence: confirmed
  paradigm_rationale: "Relationship traversal (who-follows-whom, recommendations) is the dominant query."
  primary_store: neo4j

graph_config:
  node_labels: [User, Post]
  traversal_patterns:
    - description: "Friends-of-friends up to 3 hops."
      start_label: User
      pattern: "(:User)-[:FOLLOWS*1..3]->(:User)"

entities:
  User:
    description: "A person in the social graph."
    node_label: User
    fields:
      handle:
        type: string
      display_name:
        type: string
    traces_prd_features: ["FR-001"]
    traces_ux_surfaces: []
  Post:
    description: "A piece of content authored by a user."
    node_label: Post
    fields:
      body:
        type: text
    traces_prd_features: ["FR-001"]
    traces_ux_surfaces: []

edges:
  - type: FOLLOWS
    from_entity: User
    to_entity: User
    cardinality: "N:M"
    direction: directed
    properties:
      since: timestamp
  - type: AUTHORED
    from_entity: User
    to_entity: Post
    cardinality: "1:N"
    direction: directed

