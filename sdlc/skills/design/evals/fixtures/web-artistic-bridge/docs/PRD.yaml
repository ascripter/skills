product_identity:
  name: "Sprout"
  one_liner: "A cozy habit tracker that grows a hand-drawn garden as your streaks grow."
  slug: "sprout"
  idea_text: "A gentle, illustrated habit tracker. The whole product leans on a warm, hand-drawn storybook aesthetic — every habit you keep grows a hand-illustrated plant in your garden. It's a normal web app (forms, lists, settings) but the look is bespoke illustration, not a stock component theme."

problem_opportunity:
  problem_statement: "Habit trackers feel like spreadsheets and shame users into churn. People keep habits longer when the experience is warm, rewarding, and emotionally pleasant rather than clinical."
  problem_statement_confidence: confirmed

users_personas:
  primary_users:
    - "PER-001: People building gentle daily habits who bounce off cold, data-heavy trackers."

use_cases:
  core_workflows:
    - "WKF-001: Create or edit a habit."
    - "WKF-002: Check in for the day and extend a streak."
    - "WKF-003: Watch the hand-drawn garden grow as streaks build."

functional_requirements:
  must_have_features:
    - "FR-001: Create, edit, and archive habits."
    - "FR-002: One-tap daily check-in with streak tracking."
    - "FR-003: A hand-illustrated garden view where each plant grows with its habit's streak."
    - "FR-004: Gentle, non-nagging reminders."

