# =============================================================================
# TASKS__CONTAINER.schema.yaml — canonical schema for one
#   docs/TASKS__<container>.json
# =============================================================================
# NOTE ON FORMAT: the on-disk artifact is JSON (docs/TASKS__<container>.json),
# not YAML. This file documents that JSON object using commented YAML purely so
# the schema reads the same way as every other sdlc-* schema. The keys, nesting,
# and types below map 1:1 onto the JSON. validate_schema.py loads the artifact
# with json.load, not yaml.safe_load. (Why JSON for this one artifact: see
# references/merge-validate.md → "Why the task graph is JSON".)
#
# Produced by /sdlc:task <container> (container mode). Holds the per-container
# task SUBGRAPH — the dependency-ordered implementation + test work units
# (TSK-NNN) that the Stage-14 code-generation agent fans out over, one container
# at a time. Each task is scoped to one component (CMP) or one contract, with
# explicit inputs / outputs / acceptance, mirroring the demo PRD's FR-013
# "Task Breakdown" contract.
#
# This file is the source of truth for the agents that scaffold, implement, and
# test this container. It is NEVER authored for a non-testable / non-buildable
# container (external, or a storage/infra archetype) — container mode refuses
# those, the same set `arch`/`test` refuse to drill.
#
# ID families this artifact OWNS (writer-managed counters in state.last_ids):
#   * TSK-NNN — one per task in `tasks`. INDEPENDENT counter per container file;
#               TSK-001 here is unrelated to TSK-001 in any other file.
#   * WRN-NNN — one per `task_warnings` entry.
# Upstream ids it REFERENCES:
#   * component_id            — ARCH__<container>.yaml components[].component_id
#   * work_unit name          — ARCH__<container>.yaml components[].work_units[].name
#                                (the callable a task atomically realizes as its
#                                 target_symbol; addressed as (component, name) —
#                                 no id family)
#   * TST-NNN                 — TEST-STRATEGY__<container>.yaml tests[].tst_id
#   * FR-NNN / NFR-NNN        — PRD requirements (functional + non-functional)
#   * entity names            — DATA-MODEL.yaml entities (PascalCase)
#   * operation_id            — API__<resource>.yaml endpoints[].operation_id
#   * SCR-NNN                 — UX.yaml surface_inventory[].id (the visual/CLI
#                                surfaces this container renders; from the
#                                container's owns_ux_surfaces in ARCH.yaml)
#   * WKF-NNN                 — PRD use_cases.core_workflows (the user journeys a
#                                task participates in)
#   * AST-NNN                 — DESIGN__assets.yaml assets[].id (a bespoke asset
#                                this task scaffolds a brief / pipeline slot for)
#   * cross-file TSK refs      — "<other-container>/TSK-NNN" or "TASKS/TSK-NNN"
#                                (a task in another container file or the system
#                                 file) used in depends_on for the global stitch.
#
# WHY these refs exist: the Stage-14 code agent consumes "TaskGraph + all
# upstream" and sees ONLY a task's TSK + the contracts it touches (demo FR-014).
# So a task must NAME every contract it realizes — operation, entity, surface,
# requirement — or that contract is unreachable for the sub-agent building it.
# These typed per-family fields are the sdlc equivalent of the demo Task's flat
# `implements_refs` (which lists OPR/ENT/SCR/SIG/CFG/SCT ids); we keep them typed
# per CLAUDE.md §4 so the validator can enforce a family prefix on each.
# =============================================================================

metadata:                                  # REQUIRED
  tasks_container_version: "1.1"           # REQUIRED
  last_updated: <ISO-8601 UTC>             # REQUIRED — bumped on every write
  generated_by: sdlc-task                  # REQUIRED
  session_id: <uuid4>                      # REQUIRED — sub-session id from state file
  status: draft | complete                 # REQUIRED
  changelog:                               # OPTIONAL — append-only, most-recent first.
    - "1.0 (2026-06-06): Initial container task graph."
  upstream_provenance:                     # OPTIONAL — one entry per upstream artifact
    # consumed this run, each {file, session_id, last_updated, sha256}. Lets a
    # later /sdlc:task <container> detect upstream drift. Validator type-checks
    # list-of-mappings only. See CLAUDE.md §7.
    - {file: docs/ARCH__backend-api.yaml, session_id: <uuid4>, last_updated: <iso8601>, sha256: <16-hex>}

# ---------------------------------------------------------------------------
# Identity — must match a testable container in ARCH.yaml.
# ---------------------------------------------------------------------------
container_id: <kebab-case>                  # REQUIRED — matches ARCH.yaml.containers[]
overview: <two or three sentences>          # REQUIRED — what building this container entails
inherits_from: docs/TASKS.json              # OPTIONAL — pointer to the system task graph

# ---------------------------------------------------------------------------
# tasks — the container's dependency-ordered work units. Each is a TSK-NNN item.
# Slicing is ALWAYS atomic (there is no granularity knob): one implementation
# task per component work_unit (ARCH work_units[].name — the task's
# target_symbol), one test task per TST-NNN (never grouped), one migration per
# entity. This is the method/function-level breakdown the codegen factory wants:
# tight per-task context, cheap+high-quality generation, a 1:1 task↔test mapping,
# and a task pinned to exactly one callable in exactly one file.
# `critical` per item in the interview: the agent derives candidates from the
# container's components (one impl task PER WORK_UNIT), its TEST-STRATEGY tests
# (one test task PER TST-NNN — test tasks are first-class, never grouped), its
# internal_edges (integration/wiring tasks), and a scaffold task, then confirms
# each. The list is later TOPOLOGICALLY ORDERED by depends_on.
# ---------------------------------------------------------------------------
tasks:                                      # REQUIRED — list[Task], non-empty
  - tsk_id: TSK-001                         # REQUIRED — unique within THIS file
    title: <short imperative phrase>        # REQUIRED — e.g. "Implement the auth service"
    kind:                                   # REQUIRED — one of:
      # scaffold | implementation | test | integration | migration | config | design | chore
      #   scaffold       — container skeleton: package layout, manifest, entrypoint
      #   implementation — implement a component's behaviour (the bulk of the work)
      #   test           — author the test(s) realizing one or more TST-NNN
      #   integration    — wire two components together / a within-container call
      #   migration      — schema / persistence / data-migration setup (DDL,
      #                    repository wiring) — the home for entity realization
      #   config         — env / settings wiring for this container (config_loader
      #                    component; deploy owns secrets backends)
      #   design         — realize the DESIGN system for this container's surfaces:
      #                    theme/token files (token_based_ui) or asset-folder
      #                    scaffold + per-AST generation-brief sidecars
      #                    (asset_pipeline). Frontend containers only.
      #   chore          — tooling, lint config, local CI, misc plumbing
    description: <string>                    # REQUIRED — what to build + why
    component_ref: <component_id>            # OPTIONAL (see cross-check 4) — a
                                             #   components[].component_id in the
                                             #   matching ARCH__<container>.yaml.
                                             #   An implementation/test task is
                                             #   "scoped to one CMP" via this.
    target_symbol: <work_unit name>         # REQUIRED for kind:implementation — the
                                             #   SINGLE callable (method / function /
                                             #   Class.method) this atomic task creates
                                             #   or edits, e.g. "TasksController.createTask".
                                             #   MUST equal exactly one work_units[].name
                                             #   on the component named in component_ref
                                             #   (ARCH__<container>.yaml). With the single
                                             #   target_files entry it pins the task to one
                                             #   method = the atomic codegen unit. EVERY
                                             #   component work_unit must be realized by
                                             #   exactly one task's target_symbol OR
                                             #   deferred (the work-unit coverage gate);
                                             #   target_symbol is UNIQUE across tasks.
                                             #   Empty for non-code tasks (docs / analysis).
    implements:                             # OPTIONAL — FR/NFR ids this task realizes.
      - FR-008                              #   Subset of the targeted component's /
      - NFR-011                             #   container's implements_requirements.
    implements_tests:                       # OPTIONAL (REQUIRED for kind:test) —
      - TST-003                             #   TST-NNN from TEST-STRATEGY__<container>.yaml
                                            #   this task authors. Test tasks are
                                            #   first-class: every TST-NNN must be
                                            #   realized by some task OR deferred.
    touches_entities:                       # OPTIONAL — DATA-MODEL entity names
      - User                                #   (PascalCase) this task reads/writes.
                                            #   VALIDATED ⊆ DATA-MODEL.yaml entities
                                            #   when present. Every entity the
                                            #   container's components trace must be
                                            #   realized by a task (touches_entities
                                            #   or a realized repository component)
                                            #   OR deferred (entity-coverage gate).
    touches_operations:                     # OPTIONAL — API operation_ids (the
      - create-user                         #   endpoints[].operation_id strings) OR
                                            #   OPR-NNN ids this task implements (a
                                            #   "contract" scope, the alternative to
                                            #   component_ref). VALIDATED ⊆ the
                                            #   API__*.yaml operation set when present
                                            #   — a bare resource_id is rejected.
                                            #   Every operation of a resource the
                                            #   container owns must be realized (here
                                            #   or transitively via a realized
                                            #   component tracing the resource) OR
                                            #   deferred (operation-coverage gate).
    implements_surfaces:                    # OPTIONAL (frontend) — SCR-NNN ids from
      - SCR-004                             #   UX.yaml this task renders. VALIDATED
                                            #   for SCR-NNN format + existence in UX.
                                            #   Every SCR in the container's
                                            #   owns_ux_surfaces (ARCH.yaml) must be
                                            #   realized (here or via a realized
                                            #   component's traces_ux_surfaces) OR
                                            #   deferred (surface-coverage gate).
    implements_workflows:                   # OPTIONAL — WKF-NNN user journeys this
      - WKF-002                             #   task participates in (advisory link;
                                            #   end-to-end coverage rides on the
                                            #   system e2e test tasks).
    touches_assets:                         # OPTIONAL — AST-NNN ids from
      - AST-002                             #   DESIGN__assets.yaml this design task
                                            #   scaffolds a brief / pipeline slot for.
    depends_on:                             # OPTIONAL — TSK ids that must complete
      - TSK-000                             #   first. Same-file ("TSK-000"), or
      - shared-lib/TSK-004                  #   cross-file ("<container>/TSK-NNN" or
      - TASKS/TSK-002                       #   "TASKS/TSK-NNN" for a system task).
                                            #   The union graph MUST be acyclic.
    inputs:                                 # OPTIONAL but encouraged — the upstream
      - "ARCH__backend-api.yaml#auth-service"  # artifacts / contracts / files this
                                            #   task consumes (FR-013 "explicit inputs").
    target_files:                           # REQUIRED for kind:implementation, encouraged
      - "src/auth/service.py"               #   for scaffold/test — the concrete repo-relative
                                            #   file path(s) this task CREATES or MODIFIES
                                            #   (the codegen agent's write targets). An
                                            #   implementation task carries EXACTLY ONE entry
                                            #   — the file housing its target_symbol — so the
                                            #   task is pinned to one method in one file (the
                                            #   atomic codegen unit). For a component-scoped
                                            #   task (component_ref set) it MUST sit within
                                            #   the owning component's `code_location` in
                                            #   ARCH__<container>.yaml — the placement seam
                                            #   that stops the codegen agent inventing paths.
                                            #   The validator emits an advisory WARNING
                                            #   (non-blocking) for a path outside the
                                            #   component's code_location. See
                                            #   references/task-discovery.md.
    outputs:                                # REQUIRED — non-empty. The CONTRACT-LEVEL
      - "auth-service.authenticate() exported"  # result this task makes available to
      - "TST-003 green"                     #   dependents: an exported symbol/API, an
                                            #   applied migration, a passing suite, or a
                                            #   produced artifact (FR-013 "explicit
                                            #   outputs"). Distinct from target_files (the
                                            #   raw write targets): outputs is what
                                            #   downstream tasks DEPEND ON. A file path is
                                            #   still a valid output when the file itself
                                            #   is the deliverable.
    acceptance:                             # REQUIRED — non-empty. Machine-checkable
      - "auth-service unit tests (TST-003) pass"  # done conditions (FR-013
      - "src/auth/service.py exposes authenticate()"  # "explicit acceptance").
    priority: must | should | could          # REQUIRED — must ⇒ part of MVP exit gate
    estimate: xs | s | m | l | xl            # OPTIONAL — t-shirt size for sequencing
    status: draft | confirmed                # REQUIRED — interview progress

# ---------------------------------------------------------------------------
# task_warnings — non-fatal issues + the DEFERRAL half of the trace-or-defer
# coverage contract. A component_id or a TST-NNN named in a warning counts as
# intentionally-not-realized and satisfies the coverage gate for that item
# (see references/coverage-and-defer.md). Validator enforces `^WRN-\d{3,}:\s+.+`.
# ---------------------------------------------------------------------------
task_warnings:                              # OPTIONAL — list of "WRN-NNN: ..." strings
  - "WRN-001: TST-014 is a system-level e2e test; its task lives in docs/TASKS.json, deferred here."

# =============================================================================
# Required cross-checks (run by validate_schema.py on every write)
# =============================================================================
# For each TASKS__<container>.json:
#
# 1.  Required-field completeness — status:complete requires every REQUIRED
#     field non-null, `tasks` non-empty, and every task's outputs + acceptance
#     non-empty. Every kind:implementation task additionally carries a non-empty
#     target_symbol and EXACTLY ONE target_files entry (the atomic-codegen pin).
# 2.  TSK-NNN format + uniqueness within this file; WRN-NNN format.
# 3.  Identity — container_id resolves to a testable ARCH.yaml container, and a
#     sibling docs/ARCH__<container_id>.yaml exists on disk.
# 4.  Scope integrity — every implementation task is scoped to one component or
#     one contract: kind:implementation MUST set component_ref OR touches_operations.
#     Every component_ref resolves to a components[].component_id in
#     ARCH__<container_id>.yaml. Every kind:implementation task sets target_symbol,
#     and it resolves to exactly one work_units[].name on the task's component_ref
#     in ARCH__<container_id>.yaml (a target_symbol with no component_ref is
#     rejected). No two tasks share a target_symbol. Blocks complete.
# 5.  implements integrity — every `implements` entry is FR/NFR format, resolves
#     to a PRD id, AND ⊆ the union of implements_requirements across the
#     container + the targeted component. Blocks complete.
# 6.  implements_tests integrity — every entry is TST-NNN, resolves to a
#     tests[].tst_id in TEST-STRATEGY__<container_id>.yaml. kind:test MUST set a
#     non-empty implements_tests. Blocks complete.
# 7.  Field-ref integrity (block complete; softens to format-only when the
#     upstream is absent):
#       * touches_operations  → each entry is an operation_id (or OPR-NNN) in some
#         API__*.yaml; a bare resource_id is rejected with a helpful message.
#       * touches_entities    → each entry is a DATA-MODEL.yaml entity name.
#       * implements_surfaces → SCR-NNN format + exists in UX.yaml.
#       * implements_workflows→ WKF-NNN format + exists in PRD.yaml.
#       * touches_assets      → AST-NNN format (+ exists in DESIGN__assets.yaml).
# 8.  Dependency integrity — every depends_on entry resolves to a TSK id (this
#     file, a cross-file "<cid>/TSK-NNN" against an on-disk TASKS__<cid>.json, or
#     "TASKS/TSK-NNN" against docs/TASKS.json). The UNION task graph across the
#     system file + all container files MUST be acyclic (topological sort exists).
#     Blocks complete. (The acyclicity check is what validates FR-013's
#     "deterministic stitch into one global dependency-ordered TaskGraph".)
#
# Coverage gates — all trace-or-defer, all block complete (see
# references/coverage-and-defer.md). "Realized transitively" = the item is traced
# by a component that some task realizes (component_ref) — the codegen sub-agent
# building that component reads its ARCH trace, so the item is reachable. "Defer"
# = the id is named in a task_warnings WRN-NNN.
# 9.  Component coverage — every components[].component_id in ARCH__<cid>.yaml is
#     realized by ≥1 task (component_ref) OR deferred.
# 10. Test coverage — every tests[].tst_id in TEST-STRATEGY__<cid>.yaml is
#     realized by some task (implements_tests) OR deferred.
# 11. Surface coverage — every SCR in the container's owns_ux_surfaces (ARCH.yaml,
#     mapped slug→SCR via UX.yaml) is realized by a task (implements_surfaces) or
#     transitively (a realized component's traces_ux_surfaces) OR deferred.
#     Backend containers own no surfaces ⇒ trivially satisfied. Softens to
#     advisory when UX.yaml is absent (slug↔SCR cannot be resolved).
# 12. Operation coverage — every operation_id of a resource the container owns
#     (ARCH.yaml owns_api_resources → API__*.yaml endpoints) is realized by a task
#     (touches_operations) or transitively (a realized component tracing that
#     operation or its resource) OR deferred. Softens to advisory when no
#     API__*.yaml is present.
# 13. Entity coverage — every entity the container's components trace
#     (∪ components[].traces_data_entities in ARCH__<cid>.yaml) is realized by a
#     task (touches_entities) or transitively (a realized repository component
#     tracing it) OR deferred. Advisory sibling: a DATA entity living in a store
#     the container binds but traced by no component (a likely ARCH gap) warns.
# 14. Requirement coverage — every FR/NFR in the container's + components'
#     implements_requirements is realized by a task (`implements`) or transitively
#     (a realized component declaring it) OR deferred. (Promoted from advisory to
#     blocking: the user contract is "faithfully convert all FRs/NFRs".)
# 14a. Work-unit coverage (the atomicity gate — always BLOCKING) — every
#     work_units[].name declared across the container's components in
#     ARCH__<cid>.yaml must be realized OR deferred. This is what makes atomic
#     slicing STICK. A work_unit is realized only when exactly ONE task NAMES it in
#     target_symbol (a bare component_ref does NOT transitively cover its
#     work_units — that is the whole point); otherwise defer it with a WRN-NNN.
#     Two tasks naming the same target_symbol is an error (each work_unit is built
#     once). Softens to a no-op only for a component that declares no work_units
#     (pure plumbing — it yields no implementation task; there is no coarse
#     whole-component fallback).
# 15. Design coverage — a token_based_ui frontend that owns surfaces must have a
#     kind:design (or equivalent) task wiring the design tokens/theme OR defer.
#     Per-asset (AST-NNN) realization is advisory. Skipped when DESIGN is absent
#     or functional_structure is headless.
# 16. target_files grounding — for a kind:implementation task, EXACTLY ONE
#     target_files entry (blocks complete; the atomic-codegen pin). Plus an advisory
#     (non-blocking) placement check: for a component-scoped task the entry SHOULD
#     sit within the owning component's `code_location` directories in
#     ARCH__<cid>.yaml. Outside ⇒ WARNING (placement drift). Directory-level;
#     the placement check is skipped when no code_location.
# 17. Coverage / integrity failures force metadata.status: draft (they do not
#     crash the validator) so partial task graphs remain saveable as drafts.
# =============================================================================
